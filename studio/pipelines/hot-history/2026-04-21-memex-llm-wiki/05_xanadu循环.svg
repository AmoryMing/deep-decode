<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <rect width="800" height="520" fill="#FFFFFF"/>

  <text x="400" y="40" font-family="PingFang SC, Inter, sans-serif" font-size="22" font-weight="700" fill="#37352F" text-anchor="middle">Xanadu 30 年循环 — 设想完美，交付不了</text>
  <text x="400" y="64" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#787774" text-anchor="middle">Nelson 的习惯 1960 年就在哈佛养成</text>

  <!-- 圆环布局 -->
  <circle cx="400" cy="280" r="170" fill="none" stroke="#E3E2E0" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- 节点 -->
  <g font-family="PingFang SC, Inter, sans-serif">
    <!-- 1960 哈佛 -->
    <circle cx="400" cy="110" r="10" fill="#EB5757"/>
    <text x="400" y="95" font-size="13" font-weight="700" fill="#37352F" text-anchor="middle">1960 哈佛</text>
    <text x="400" y="145" font-size="11" fill="#787774" text-anchor="middle">term project 没写完</text>

    <!-- 1965 hypertext -->
    <circle cx="570" cy="280" r="10" fill="#EB5757"/>
    <text x="590" y="275" font-size="13" font-weight="700" fill="#37352F">1965</text>
    <text x="590" y="293" font-size="11" fill="#787774">造词 hypertext</text>

    <!-- 1979 方案 -->
    <circle cx="510" cy="410" r="10" fill="#EB5757"/>
    <text x="510" y="440" font-size="13" font-weight="700" fill="#37352F" text-anchor="middle">1979</text>
    <text x="510" y="458" font-size="11" fill="#787774" text-anchor="middle">方案几乎没变</text>

    <!-- 1989 Autodesk -->
    <circle cx="290" cy="410" r="10" fill="#EB5757"/>
    <text x="290" y="440" font-size="13" font-weight="700" fill="#37352F" text-anchor="middle">1989</text>
    <text x="290" y="458" font-size="11" fill="#787774" text-anchor="middle">Autodesk 重启</text>

    <!-- 1994 破产 -->
    <circle cx="230" cy="280" r="10" fill="#EB5757"/>
    <text x="210" y="275" font-size="13" font-weight="700" fill="#37352F" text-anchor="end">1994</text>
    <text x="210" y="293" font-size="11" fill="#787774" text-anchor="end">Xanadu 破产</text>
  </g>

  <!-- 中心文字 -->
  <text x="400" y="270" font-family="PingFang SC, Inter, sans-serif" font-size="16" font-weight="700" fill="#EB5757" text-anchor="middle">同一个模式</text>
  <text x="400" y="292" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle">重复 30 年</text>

  <!-- 底部引用 -->
  <rect x="80" y="475" width="640" height="30" rx="6" fill="#F7F7F5"/>
  <text x="400" y="495" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774" text-anchor="middle" font-style="italic">"一个会跟他一辈子的习惯" — WIRED《The Curse of Xanadu》1995</text>
</svg>
