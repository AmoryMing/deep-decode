<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#FFFFFF"/>

  <!-- 顶部大标题 -->
  <text x="400" y="58" font-family="PingFang SC, Inter, sans-serif" font-size="26" font-weight="700" fill="#37352F" text-anchor="middle">脚本 1974</text>
  <text x="400" y="90" font-family="PingFang SC, Inter, sans-serif" font-size="15" fill="#787774" text-anchor="middle">Anthropic 的 SKILL.md 是 Minsky 51 年前写好的</text>

  <!-- 左侧：1974 老纸 -->
  <g transform="translate(80, 140)">
    <rect x="0" y="0" width="240" height="260" rx="4" fill="#FAFAF8" stroke="#E3E2E0" stroke-width="1.5"/>
    <rect x="0" y="0" width="240" height="36" rx="4" fill="#37352F"/>
    <text x="120" y="23" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="600">MIT AI Memo 306</text>

    <text x="20" y="70" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">1974 年 6 月</text>
    <text x="20" y="90" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">Marvin Minsky</text>

    <text x="20" y="120" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" font-weight="600">A Framework for</text>
    <text x="20" y="138" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" font-weight="600">Representing Knowledge</text>

    <line x1="20" y1="160" x2="220" y2="160" stroke="#E3E2E0" stroke-width="1"/>
    <text x="20" y="180" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F">· Frame 数据结构</text>
    <text x="20" y="200" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F">· Slot 默认值松绑</text>
    <text x="20" y="220" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F">· 按情境整块调用</text>
    <text x="20" y="240" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F">· 异常处理预挂</text>
  </g>

  <!-- 中间 51 年时间轴 -->
  <g transform="translate(340, 270)">
    <line x1="0" y1="0" x2="120" y2="0" stroke="#2383E2" stroke-width="2"/>
    <polygon points="120,0 112,-5 112,5" fill="#2383E2"/>
    <text x="60" y="-14" font-family="PingFang SC, Inter, sans-serif" font-size="24" font-weight="700" fill="#2383E2" text-anchor="middle">51 年</text>
    <text x="60" y="22" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774" text-anchor="middle">一场寒冬 + 三代专家系统</text>
    <text x="60" y="38" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774" text-anchor="middle">+ 一个 Transformer</text>
  </g>

  <!-- 右侧：2025 SKILL.md -->
  <g transform="translate(480, 140)">
    <rect x="0" y="0" width="240" height="260" rx="4" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1.5"/>
    <rect x="0" y="0" width="240" height="36" rx="4" fill="#2383E2"/>
    <text x="120" y="23" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="600">SKILL.md</text>

    <text x="20" y="70" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">2025 年 10 月</text>
    <text x="20" y="90" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">Anthropic</text>

    <text x="20" y="120" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" font-weight="600">Introducing Agent Skills</text>

    <line x1="20" y1="160" x2="220" y2="160" stroke="#E3E2E0" stroke-width="1"/>
    <text x="20" y="180" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F">· YAML + Markdown 文件夹</text>
    <text x="20" y="200" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F">· 自然语言描述 Slot</text>
    <text x="20" y="220" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F">· Progressive disclosure</text>
    <text x="20" y="240" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F">· Pitfalls 段</text>
  </g>

  <!-- 底部金句 -->
  <text x="400" y="455" font-family="PingFang SC, Inter, sans-serif" font-size="15" fill="#37352F" text-anchor="middle" font-style="italic">1974 年 Minsky 没有错，他只是早了一个 Transformer</text>
</svg>
