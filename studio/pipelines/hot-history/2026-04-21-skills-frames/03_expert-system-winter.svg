<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="540" viewBox="0 0 800 540">
  <rect width="800" height="540" fill="#FFFFFF"/>

  <!-- 标题 -->
  <text x="400" y="40" font-family="PingFang SC, Inter, sans-serif" font-size="22" font-weight="700" fill="#37352F" text-anchor="middle">1987 专家系统之冬</text>
  <text x="400" y="66" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#787774" text-anchor="middle">三重崩溃同时发生，12 个月推倒一整个行业</text>

  <!-- 三根柱子（多米诺感） -->
  <!-- 第一根：硬件 -->
  <g transform="translate(80, 130)">
    <rect x="0" y="0" width="180" height="320" rx="10" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1.5"/>
    <rect x="0" y="0" width="180" height="50" rx="10" fill="#EB5757"/>
    <text x="90" y="32" font-family="PingFang SC, Inter, sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle" font-weight="700">外因 · 硬件</text>

    <text x="90" y="90" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#37352F" text-anchor="middle" font-weight="600">LISP 机被打穿</text>

    <text x="18" y="130" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F">Symbolics</text>
    <text x="18" y="150" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F">LISP Machines</text>
    <text x="18" y="170" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F">Lucid</text>

    <line x1="18" y1="185" x2="162" y2="185" stroke="#E3E2E0"/>

    <text x="90" y="215" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774" text-anchor="middle">VS</text>

    <text x="90" y="245" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle" font-weight="600">Sun 工作站 + CLIPS</text>
    <text x="90" y="263" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774" text-anchor="middle">性价比差一个数量级</text>

    <rect x="20" y="280" width="140" height="28" rx="4" fill="#EB5757" opacity="0.12"/>
    <text x="90" y="298" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#EB5757" text-anchor="middle" font-weight="600">半年蒸发 5 亿美元</text>
  </g>

  <!-- 第二根：XCON -->
  <g transform="translate(310, 130)">
    <rect x="0" y="0" width="180" height="320" rx="10" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1.5"/>
    <rect x="0" y="0" width="180" height="50" rx="10" fill="#FFB020"/>
    <text x="90" y="32" font-family="PingFang SC, Inter, sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle" font-weight="700">内因 · XCON</text>

    <text x="90" y="90" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#37352F" text-anchor="middle" font-weight="600">维护崩溃</text>

    <text x="90" y="130" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F" text-anchor="middle">DEC 配置专家系统</text>
    <text x="90" y="150" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774" text-anchor="middle">一度每年省 4000 万</text>

    <line x1="18" y1="170" x2="162" y2="170" stroke="#E3E2E0"/>

    <text x="90" y="200" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle" font-weight="600">规则越堆越多</text>

    <text x="90" y="230" font-family="PingFang SC, Inter, sans-serif" font-size="24" fill="#FFB020" text-anchor="middle" font-weight="700">10,000+</text>
    <text x="90" y="250" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774" text-anchor="middle">1989 年的规则数</text>

    <rect x="20" y="280" width="140" height="28" rx="4" fill="#FFB020" opacity="0.15"/>
    <text x="90" y="298" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#FFB020" text-anchor="middle" font-weight="600">改一处，崩一片</text>
  </g>

  <!-- 第三根：知识获取瓶颈 -->
  <g transform="translate(540, 130)">
    <rect x="0" y="0" width="180" height="320" rx="10" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1.5"/>
    <rect x="0" y="0" width="180" height="50" rx="10" fill="#9B51E0"/>
    <text x="90" y="32" font-family="PingFang SC, Inter, sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle" font-weight="700">致命 · 瓶颈</text>

    <text x="90" y="90" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#37352F" text-anchor="middle" font-weight="600">Feigenbaum 1981</text>

    <text x="90" y="130" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F" text-anchor="middle">tacit 知识挖不出来</text>
    <text x="90" y="150" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774" text-anchor="middle">专家自己说不清</text>

    <line x1="18" y1="170" x2="162" y2="170" stroke="#E3E2E0"/>

    <text x="18" y="200" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F">MYCIN · 600 条</text>
    <text x="18" y="220" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">斯坦福数年</text>

    <text x="18" y="245" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F">CYC · 2500 万条</text>
    <text x="18" y="265" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">四十年还在干</text>

    <rect x="20" y="280" width="140" height="28" rx="4" fill="#9B51E0" opacity="0.12"/>
    <text x="90" y="298" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#9B51E0" text-anchor="middle" font-weight="600">进不去人脑</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="495" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle" font-style="italic">Frame 结构的死穴：要求你提前把 slot 定义清楚</text>
  <text x="400" y="518" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774" text-anchor="middle">偏偏人脑里的 slot 本来就没被"定义"过</text>
</svg>
