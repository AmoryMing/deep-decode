<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <rect width="800" height="520" fill="#FFFFFF"/>

  <defs>
    <marker id="arr1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#EB5757"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4DB6AC"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="400" y="40" font-family="PingFang SC, Inter, sans-serif" font-size="22" font-weight="700" fill="#37352F" text-anchor="middle">知识获取瓶颈的两种命运</text>
  <text x="400" y="66" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#787774" text-anchor="middle">Frames 栽在它身上，Skills 绕开它</text>

  <!-- 上半：Frames 手工链路 -->
  <g transform="translate(40, 100)">
    <text x="0" y="0" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="700" fill="#EB5757">1980s · Frames 时代</text>
    <text x="0" y="20" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">手工开槽，跑几个月才能上线</text>

    <!-- 专家 -->
    <g transform="translate(0, 50)">
      <rect x="0" y="0" width="100" height="60" rx="6" fill="#F7F7F5" stroke="#E3E2E0"/>
      <text x="50" y="28" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle" font-weight="600">领域专家</text>
      <text x="50" y="47" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774" text-anchor="middle">tacit 判断</text>
    </g>

    <line x1="100" y1="80" x2="145" y2="80" stroke="#EB5757" stroke-width="2" marker-end="url(#arr1)"/>

    <!-- 知识工程师 -->
    <g transform="translate(150, 50)">
      <rect x="0" y="0" width="120" height="60" rx="6" fill="#F7F7F5" stroke="#E3E2E0"/>
      <text x="60" y="25" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle" font-weight="600">知识工程师</text>
      <text x="60" y="44" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774" text-anchor="middle">追问 / 翻译 / 编码</text>
    </g>

    <line x1="270" y1="80" x2="315" y2="80" stroke="#EB5757" stroke-width="2" marker-end="url(#arr1)"/>

    <!-- 规则库 -->
    <g transform="translate(320, 50)">
      <rect x="0" y="0" width="110" height="60" rx="6" fill="#F7F7F5" stroke="#E3E2E0"/>
      <text x="55" y="25" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle" font-weight="600">if-then 规则</text>
      <text x="55" y="44" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774" text-anchor="middle">MYCIN 600 条</text>
    </g>

    <line x1="430" y1="80" x2="475" y2="80" stroke="#EB5757" stroke-width="2" marker-end="url(#arr1)"/>

    <!-- 上线 -->
    <g transform="translate(480, 50)">
      <rect x="0" y="0" width="110" height="60" rx="6" fill="#F7F7F5" stroke="#E3E2E0"/>
      <text x="55" y="25" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle" font-weight="600">Frame 系统</text>
      <text x="55" y="44" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774" text-anchor="middle">KEE / CYC / XCON</text>
    </g>

    <!-- 代价标签 -->
    <rect x="610" y="50" width="110" height="60" rx="6" fill="#EB5757" opacity="0.12"/>
    <text x="665" y="75" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#EB5757" text-anchor="middle" font-weight="600">耗时数年</text>
    <text x="665" y="94" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#EB5757" text-anchor="middle">维护爆炸而死</text>
  </g>

  <!-- 分隔 -->
  <line x1="40" y1="290" x2="760" y2="290" stroke="#E3E2E0" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- 下半：Skills 自动链路 -->
  <g transform="translate(40, 320)">
    <text x="0" y="0" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="700" fill="#4DB6AC">2025 · Skills 时代</text>
    <text x="0" y="20" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">自然语言描述，模型自己读懂</text>

    <!-- 专家 -->
    <g transform="translate(0, 50)">
      <rect x="0" y="0" width="100" height="60" rx="6" fill="#F7F7F5" stroke="#E3E2E0"/>
      <text x="50" y="28" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle" font-weight="600">领域专家</text>
      <text x="50" y="47" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774" text-anchor="middle">写 SKILL.md</text>
    </g>

    <line x1="100" y1="80" x2="305" y2="80" stroke="#4DB6AC" stroke-width="2" marker-end="url(#arr2)"/>
    <text x="200" y="72" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#4DB6AC" text-anchor="middle">一条箭头</text>

    <!-- LLM 解读 -->
    <g transform="translate(310, 50)">
      <rect x="0" y="0" width="180" height="60" rx="6" fill="#4DB6AC" opacity="0.12" stroke="#4DB6AC"/>
      <text x="90" y="25" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle" font-weight="600">LLM 运行时解读</text>
      <text x="90" y="44" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774" text-anchor="middle">替代了知识工程师整条链</text>
    </g>

    <line x1="490" y1="80" x2="535" y2="80" stroke="#4DB6AC" stroke-width="2" marker-end="url(#arr2)"/>

    <!-- Skills 系统 -->
    <g transform="translate(540, 50)">
      <rect x="0" y="0" width="110" height="60" rx="6" fill="#F7F7F5" stroke="#E3E2E0"/>
      <text x="55" y="25" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle" font-weight="600">Skill 上线</text>
      <text x="55" y="44" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774" text-anchor="middle">学十分钟</text>
    </g>

    <!-- 代价标签 -->
    <rect x="670" y="50" width="80" height="60" rx="6" fill="#4DB6AC" opacity="0.15"/>
    <text x="710" y="77" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#4DB6AC" text-anchor="middle" font-weight="600">当天</text>
    <text x="710" y="96" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#4DB6AC" text-anchor="middle">能跑</text>
  </g>

  <!-- 底部判断 -->
  <text x="400" y="490" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle" font-style="italic">瓶颈没被解决，解读工作被外包给了 LLM</text>
</svg>
