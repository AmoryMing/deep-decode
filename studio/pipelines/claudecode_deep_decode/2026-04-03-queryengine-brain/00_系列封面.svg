<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7F7F5"/>
      <stop offset="100%" style="stop-color:#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bgGrad)"/>

  <!-- Series badge -->
  <rect x="30" y="25" width="200" height="28" rx="14" fill="#2383E2" opacity="0.1"/>
  <text x="130" y="44" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#2383E2" text-anchor="middle" font-weight="600">Claude Code 源码拆解 #04</text>

  <!-- Main title -->
  <text x="400" y="160" font-family="PingFang SC, Inter, sans-serif" font-size="36" fill="#37352F" text-anchor="middle" font-weight="700">QueryEngine</text>
  <text x="400" y="210" font-family="PingFang SC, Inter, sans-serif" font-size="28" fill="#37352F" text-anchor="middle" font-weight="400">13000 行代码的大脑中枢</text>

  <!-- Spine visual metaphor -->
  <line x1="400" y1="240" x2="400" y2="340" stroke="#2383E2" stroke-width="3" stroke-linecap="round"/>
  <!-- Vertebrae -->
  <rect x="355" y="250" width="90" height="22" rx="4" fill="#2383E2" opacity="0.15"/>
  <text x="400" y="265" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#2383E2" text-anchor="middle">main.tsx</text>

  <rect x="340" y="280" width="120" height="22" rx="4" fill="#2383E2" opacity="0.25"/>
  <text x="400" y="295" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#2383E2" text-anchor="middle">QueryEngine.ts</text>

  <rect x="330" y="310" width="140" height="22" rx="4" fill="#2383E2" opacity="0.4"/>
  <text x="400" y="325" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#2383E2" text-anchor="middle" font-weight="600">query.ts</text>

  <!-- Subtitle -->
  <text x="400" y="390" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#787774" text-anchor="middle">五步净化 / 流式执行 / 胖核心哲学</text>

  <!-- Bottom line -->
  <line x1="100" y1="420" x2="700" y2="420" stroke="#E3E2E0" stroke-width="1"/>
  <text x="400" y="440" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774" text-anchor="middle">AI笔记 | 2026-04-07</text>
</svg>
