<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="38" font-family="PingFang SC, Inter, sans-serif" font-size="20" fill="#37352F" text-anchor="middle" font-weight="700">"胖核心"哲学：Agent 的 bug 不在模块内部，在模块之间</text>

  <!-- VS divider -->
  <line x1="400" y1="60" x2="400" y2="380" stroke="#E3E2E0" stroke-width="1" stroke-dasharray="6"/>
  <rect x="380" y="175" width="40" height="30" rx="15" fill="#37352F"/>
  <text x="400" y="195" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="700">VS</text>

  <!-- Left: Fat Core -->
  <text x="200" y="80" font-family="PingFang SC, Inter, sans-serif" font-size="16" fill="#4DB6AC" text-anchor="middle" font-weight="700">胖核心（Claude Code 的选择）</text>

  <!-- Big central block -->
  <rect x="80" y="100" width="240" height="180" rx="10" fill="#E8F5E9" stroke="#4DB6AC" stroke-width="2"/>
  <text x="200" y="130" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#37352F" text-anchor="middle" font-weight="600">query.ts</text>

  <!-- Internal state items -->
  <rect x="100" y="145" width="85" height="20" rx="4" fill="#4DB6AC" opacity="0.2"/>
  <text x="142" y="159" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#37352F" text-anchor="middle">五步净化</text>

  <rect x="195" y="145" width="85" height="20" rx="4" fill="#4DB6AC" opacity="0.2"/>
  <text x="237" y="159" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#37352F" text-anchor="middle">流式执行</text>

  <rect x="100" y="175" width="85" height="20" rx="4" fill="#4DB6AC" opacity="0.2"/>
  <text x="142" y="189" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#37352F" text-anchor="middle">fallback</text>

  <rect x="195" y="175" width="85" height="20" rx="4" fill="#4DB6AC" opacity="0.2"/>
  <text x="237" y="189" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#37352F" text-anchor="middle">tombstone</text>

  <rect x="100" y="205" width="85" height="20" rx="4" fill="#4DB6AC" opacity="0.2"/>
  <text x="142" y="219" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#37352F" text-anchor="middle">token 预算</text>

  <rect x="195" y="205" width="85" height="20" rx="4" fill="#4DB6AC" opacity="0.2"/>
  <text x="237" y="219" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#37352F" text-anchor="middle">用户中断</text>

  <rect x="100" y="235" width="180" height="20" rx="4" fill="#4DB6AC" opacity="0.2"/>
  <text x="190" y="249" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#37352F" text-anchor="middle">thinking block 规则</text>

  <text x="200" y="275" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#4DB6AC" text-anchor="middle">所有状态流转一目了然</text>

  <!-- Left pros -->
  <rect x="60" y="300" width="280" height="80" rx="8" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="200" y="322" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#4DB6AC" text-anchor="middle" font-weight="600">优势</text>
  <text x="80" y="342" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#37352F">调试时能看到全部状态流转</text>
  <text x="80" y="360" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#37352F">跨轮次状态不会在模块间丢失</text>
  <text x="80" y="375" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">代价：难以并行开发、新人上手慢</text>

  <!-- Right: Over-modularized -->
  <text x="600" y="80" font-family="PingFang SC, Inter, sans-serif" font-size="16" fill="#EB5757" text-anchor="middle" font-weight="700">过度模块化</text>

  <!-- Many small blocks -->
  <rect x="470" y="100" width="75" height="45" rx="6" fill="#FFEBEE" stroke="#EB5757" stroke-width="1"/>
  <text x="507" y="127" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#37352F" text-anchor="middle">compress.ts</text>

  <rect x="555" y="100" width="75" height="45" rx="6" fill="#FFEBEE" stroke="#EB5757" stroke-width="1"/>
  <text x="592" y="127" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#37352F" text-anchor="middle">execute.ts</text>

  <rect x="640" y="100" width="75" height="45" rx="6" fill="#FFEBEE" stroke="#EB5757" stroke-width="1"/>
  <text x="677" y="127" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#37352F" text-anchor="middle">fallback.ts</text>

  <rect x="470" y="160" width="75" height="45" rx="6" fill="#FFEBEE" stroke="#EB5757" stroke-width="1"/>
  <text x="507" y="187" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#37352F" text-anchor="middle">interrupt.ts</text>

  <rect x="555" y="160" width="75" height="45" rx="6" fill="#FFEBEE" stroke="#EB5757" stroke-width="1"/>
  <text x="592" y="187" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#37352F" text-anchor="middle">budget.ts</text>

  <rect x="640" y="160" width="75" height="45" rx="6" fill="#FFEBEE" stroke="#EB5757" stroke-width="1"/>
  <text x="677" y="187" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#37352F" text-anchor="middle">thinking.ts</text>

  <!-- Chaotic arrows between modules -->
  <line x1="545" y1="122" x2="555" y2="122" stroke="#EB5757" stroke-width="1" opacity="0.5"/>
  <line x1="630" y1="122" x2="640" y2="122" stroke="#EB5757" stroke-width="1" opacity="0.5"/>
  <line x1="507" y1="145" x2="507" y2="160" stroke="#EB5757" stroke-width="1" opacity="0.5"/>
  <line x1="592" y1="145" x2="592" y2="160" stroke="#EB5757" stroke-width="1" opacity="0.5"/>
  <line x1="677" y1="145" x2="677" y2="160" stroke="#EB5757" stroke-width="1" opacity="0.5"/>
  <line x1="545" y1="182" x2="555" y2="182" stroke="#EB5757" stroke-width="1" opacity="0.5"/>
  <line x1="630" y1="182" x2="640" y2="182" stroke="#EB5757" stroke-width="1" opacity="0.5"/>
  <!-- Cross arrows -->
  <line x1="545" y1="140" x2="640" y2="165" stroke="#EB5757" stroke-width="1" opacity="0.3" stroke-dasharray="3"/>
  <line x1="630" y1="140" x2="470" y2="165" stroke="#EB5757" stroke-width="1" opacity="0.3" stroke-dasharray="3"/>

  <text x="600" y="230" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#EB5757" text-anchor="middle">模块瘦了，但交互爆炸了</text>

  <!-- Comparison: 88 vs 13000 -->
  <rect x="470" y="245" width="250" height="35" rx="6" fill="#FFEBEE" stroke="#EB5757" stroke-width="1"/>
  <text x="595" y="260" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#37352F" text-anchor="middle">Rust 重写: 88 行（只有骨架）</text>
  <text x="595" y="275" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774" text-anchor="middle">没有: 压缩/流式/fallback/中断恢复/...</text>

  <!-- Right cons -->
  <rect x="460" y="300" width="280" height="80" rx="8" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="600" y="322" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#EB5757" text-anchor="middle" font-weight="600">问题</text>
  <text x="480" y="342" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#37352F">"一个大函数看不懂" 变成</text>
  <text x="480" y="360" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#37352F">"十个小模块的交互看不懂"</text>
  <text x="480" y="375" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#EB5757">后者通常更难调试</text>

  <!-- Bottom insight -->
  <rect x="60" y="400" width="680" height="55" rx="8" fill="#E8F4FD" stroke="#2383E2" stroke-width="1"/>
  <text x="400" y="422" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#2383E2" text-anchor="middle" font-weight="600">Agent 系统的核心状态机：宁可大而集中，不要小而分散</text>
  <text x="400" y="445" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774" text-anchor="middle">但注意临界点：当你开始给胖核心写子模块时（stopHooks.ts / config.ts / deps.ts），说明它在减肥了</text>

  <!-- Footer -->
  <text x="400" y="475" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774" text-anchor="middle">Claude Code 源码拆解 #04 | QueryEngine | AI笔记 2026-04-07</text>
</svg>
