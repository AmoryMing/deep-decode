<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <rect width="800" height="520" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="40" font-family="PingFang SC, Inter, sans-serif" font-size="20" fill="#37352F" text-anchor="middle" font-weight="700">五步净化：每次 API 调用前的认知预处理</text>
  <text x="400" y="62" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774" text-anchor="middle">原始对话历史 → 优化后的 API 请求</text>

  <!-- Step 1: Snip -->
  <rect x="40" y="90" width="130" height="80" rx="8" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1.5"/>
  <text x="105" y="115" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#37352F" text-anchor="middle" font-weight="600">1. Snip</text>
  <text x="105" y="135" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774" text-anchor="middle">按边界裁剪历史</text>
  <text x="105" y="155" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#2383E2" text-anchor="middle">HISTORY_SNIP flag</text>

  <!-- Arrow 1→2 -->
  <line x1="175" y1="130" x2="205" y2="130" stroke="#2383E2" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- token count flows down -->
  <text x="190" y="120" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#EB5757" text-anchor="middle">token数</text>
  <text x="190" y="108" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#EB5757" text-anchor="middle">向下传递</text>

  <!-- Step 2: MicroCompact -->
  <rect x="210" y="90" width="130" height="80" rx="8" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1.5"/>
  <text x="275" y="115" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#37352F" text-anchor="middle" font-weight="600">2. 微压缩</text>
  <text x="275" y="135" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774" text-anchor="middle">就地缩减工具结果</text>
  <text x="275" y="155" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#4DB6AC" text-anchor="middle">与内容替换正交</text>

  <!-- Arrow 2→3 -->
  <line x1="345" y1="130" x2="375" y2="130" stroke="#2383E2" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Context Collapse -->
  <rect x="380" y="90" width="130" height="80" rx="8" fill="#F7F7F5" stroke="#2383E2" stroke-width="1.5"/>
  <text x="445" y="110" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#37352F" text-anchor="middle" font-weight="600">3. 上下文折叠</text>
  <text x="445" y="130" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774" text-anchor="middle">折叠大块中间内容</text>
  <text x="445" y="150" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#2383E2" text-anchor="middle">CONTEXT_COLLAPSE flag</text>
  <text x="445" y="165" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#EB5757" text-anchor="middle">刻意在 AutoCompact 之前</text>

  <!-- Arrow 3→4 -->
  <line x1="515" y1="130" x2="545" y2="130" stroke="#2383E2" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: AutoCompact -->
  <rect x="550" y="90" width="130" height="80" rx="8" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1.5"/>
  <text x="615" y="110" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#37352F" text-anchor="middle" font-weight="600">4. 自动压缩</text>
  <text x="615" y="130" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774" text-anchor="middle">token 临近窗口时触发</text>
  <text x="615" y="150" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#FFB020" text-anchor="middle">Buffer: 13K tokens</text>
  <text x="615" y="165" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#EB5757" text-anchor="middle">最多连续失败 3 次</text>

  <!-- Arrow 4→5 -->
  <line x1="685" y1="130" x2="715" y2="130" stroke="#2383E2" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: Assemble -->
  <rect x="720" y="90" width="60" height="80" rx="8" fill="#2383E2" opacity="0.15" stroke="#2383E2" stroke-width="1.5"/>
  <text x="750" y="125" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#2383E2" text-anchor="middle" font-weight="600">5.</text>
  <text x="750" y="143" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#2383E2" text-anchor="middle">组装</text>
  <text x="750" y="158" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#2383E2" text-anchor="middle">请求</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2383E2"/>
    </marker>
  </defs>

  <!-- Key insight box -->
  <rect x="40" y="200" width="720" height="70" rx="8" fill="#FFF8E1" stroke="#FFB020" stroke-width="1"/>
  <text x="60" y="225" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" font-weight="600">关键设计：步骤之间有精心的依赖关系</text>
  <text x="60" y="248" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">Step 1 裁剪的 token 数传给 Step 4，让阈值判断更准确</text>
  <text x="60" y="265" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">Step 3 刻意在 Step 4 之前 → 如果折叠够用就跳过压缩，保留细粒度上下文</text>

  <!-- Data cards -->
  <rect x="40" y="295" width="230" height="100" rx="8" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="155" y="320" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle" font-weight="600">AutoCompact 关键数字</text>
  <text x="60" y="345" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">预留缓冲: 13,000 tokens</text>
  <text x="60" y="365" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">p99.99 摘要输出: 17,387 tokens</text>
  <text x="60" y="385" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">最大连续失败: 3 次</text>

  <rect x="290" y="295" width="230" height="100" rx="8" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="405" y="320" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle" font-weight="600">压缩时的铁律</text>
  <text x="310" y="345" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#EB5757">"CRITICAL: Respond with</text>
  <text x="310" y="365" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#EB5757">TEXT ONLY. Do NOT call</text>
  <text x="310" y="385" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#EB5757">any tools."</text>

  <rect x="540" y="295" width="220" height="100" rx="8" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="650" y="320" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle" font-weight="600">Agent token 消耗</text>
  <text x="560" y="348" font-family="PingFang SC, Inter, sans-serif" font-size="24" fill="#2383E2" font-weight="700">4x</text>
  <text x="610" y="348" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">于普通 chat</text>
  <text x="560" y="378" font-family="PingFang SC, Inter, sans-serif" font-size="24" fill="#EB5757" font-weight="700">15x</text>
  <text x="618" y="378" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">多 Agent 场景</text>

  <!-- Bottom insight -->
  <rect x="40" y="420" width="720" height="50" rx="8" fill="#E8F4FD" stroke="#2383E2" stroke-width="1"/>
  <text x="400" y="445" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#2383E2" text-anchor="middle" font-weight="600">不是等窗口满了才压缩 → 每一轮都在精细调控进入模型的信息质量</text>
  <text x="400" y="462" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774" text-anchor="middle">来源: ByteByteGo -- "the model needs the right information, not all available information"</text>

  <!-- Page footer -->
  <text x="400" y="508" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774" text-anchor="middle">Claude Code 源码拆解 #04 | QueryEngine | AI笔记 2026-04-07</text>
</svg>
