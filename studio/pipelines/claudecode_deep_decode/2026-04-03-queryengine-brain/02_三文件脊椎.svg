<svg xmlns="http://www.w3.org/2000/svg" width="800" height="550" viewBox="0 0 800 550">
  <rect width="800" height="550" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="40" font-family="PingFang SC, Inter, sans-serif" font-size="20" fill="#37352F" text-anchor="middle" font-weight="700">三文件脊椎：Claude Code 的大脑是怎么接线的</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowDown" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#2383E2"/>
    </marker>
    <marker id="arrowRight" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#787774"/>
    </marker>
  </defs>

  <!-- Layer 1: main.tsx -->
  <rect x="220" y="70" width="360" height="75" rx="8" fill="#F0F7FF" stroke="#2383E2" stroke-width="1.5"/>
  <text x="400" y="95" font-family="PingFang SC, Inter, sans-serif" font-size="16" fill="#2383E2" text-anchor="middle" font-weight="700">main.tsx</text>
  <text x="400" y="115" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F" text-anchor="middle">启动器：并行预取 MDM / Keychain / API</text>
  <text x="400" y="133" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774" text-anchor="middle">职责：拉起来</text>

  <!-- Role labels on the right -->
  <rect x="610" y="85" width="140" height="40" rx="6" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="680" y="100" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774" text-anchor="middle">启动优化</text>
  <text x="680" y="116" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774" text-anchor="middle">运行时体验</text>

  <!-- Arrow down -->
  <line x1="400" y1="150" x2="400" y2="175" stroke="#2383E2" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Layer 2: QueryEngine.ts -->
  <rect x="170" y="180" width="460" height="120" rx="8" fill="#F0FFF4" stroke="#4DB6AC" stroke-width="1.5"/>
  <text x="400" y="205" font-family="PingFang SC, Inter, sans-serif" font-size="16" fill="#4DB6AC" text-anchor="middle" font-weight="700">QueryEngine.ts</text>
  <text x="400" y="225" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F" text-anchor="middle">会话管理者：submitMessage() 准备全部运行时上下文</text>

  <!-- State items -->
  <rect x="190" y="240" width="100" height="24" rx="4" fill="#4DB6AC" opacity="0.12"/>
  <text x="240" y="257" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#37352F" text-anchor="middle">mutableMessages</text>

  <rect x="300" y="240" width="95" height="24" rx="4" fill="#4DB6AC" opacity="0.12"/>
  <text x="347" y="257" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#37352F" text-anchor="middle">abortController</text>

  <rect x="405" y="240" width="105" height="24" rx="4" fill="#4DB6AC" opacity="0.12"/>
  <text x="457" y="257" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#37352F" text-anchor="middle">permissionDenials</text>

  <rect x="520" y="240" width="90" height="24" rx="4" fill="#4DB6AC" opacity="0.12"/>
  <text x="565" y="257" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#37352F" text-anchor="middle">totalUsage</text>

  <text x="400" y="290" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774" text-anchor="middle">职责：准备好（跨轮次状态持久化）</text>

  <!-- Arrow down -->
  <line x1="400" y1="305" x2="400" y2="330" stroke="#2383E2" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- processUserInput in between -->
  <rect x="280" y="330" width="240" height="35" rx="6" fill="#FFF8E1" stroke="#FFB020" stroke-width="1"/>
  <text x="400" y="353" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F" text-anchor="middle">processUserInput.ts  (预处理用户输入)</text>

  <!-- Arrow down -->
  <line x1="400" y1="370" x2="400" y2="395" stroke="#2383E2" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Layer 3: query.ts -->
  <rect x="140" y="400" width="520" height="90" rx="8" fill="#FFF0F0" stroke="#EB5757" stroke-width="1.5"/>
  <text x="400" y="425" font-family="PingFang SC, Inter, sans-serif" font-size="16" fill="#EB5757" text-anchor="middle" font-weight="700">query.ts  (AsyncGenerator while(true))</text>
  <text x="400" y="448" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F" text-anchor="middle">核心循环：五步净化 → API 调用 → 工具执行 → 状态迁移</text>
  <text x="400" y="468" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774" text-anchor="middle">职责：跑起来（"胖核心"，所有数据流的汇聚点）</text>
  <text x="400" y="483" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#EB5757" text-anchor="middle">"年轻的巫师，好好记住这些规则，否则你将被惩罚整整一天的调试和抓狂"</text>

  <!-- Side annotations -->
  <rect x="30" y="195" width="120" height="90" rx="6" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="90" y="215" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#37352F" text-anchor="middle" font-weight="600">三层提示词</text>
  <text x="90" y="235" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774" text-anchor="middle">defaultSystemPrompt</text>
  <text x="90" y="252" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774" text-anchor="middle">userContext</text>
  <text x="90" y="269" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774" text-anchor="middle">systemContext</text>
  <line x1="150" y1="240" x2="170" y2="240" stroke="#787774" stroke-width="1" stroke-dasharray="4" marker-end="url(#arrowRight)"/>

  <!-- Bottom insight -->
  <text x="400" y="530" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle" font-weight="600">三文件不是调用层级，是职责分层 → 工程难度在接口处的状态传递</text>
</svg>
