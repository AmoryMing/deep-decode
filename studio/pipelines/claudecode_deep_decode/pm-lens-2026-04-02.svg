<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'PingFang SC','Microsoft YaHei','Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="800" fill="#f8f9fb"/>

  <!-- 头部 -->
  <rect width="1200" height="80" fill="url(#headerGrad)" rx="0"/>
  <text x="40" y="45" fill="#fff" font-size="22" font-weight="bold">Claude Code 情绪检测 → 产品机会</text>
  <text x="40" y="68" fill="#94a3b8" font-size="13">PM Lens | 源码逆向发现 → 产品提案 | 2026-04-02</text>
  <rect x="880" y="20" width="280" height="40" rx="20" fill="url(#accentGrad)" opacity="0.9"/>
  <text x="1020" y="46" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">核心洞察：正则代替 NPS</text>

  <!-- 左半区：做了什么 -->
  <text x="40" y="115" fill="#64748b" font-size="12" font-weight="bold" letter-spacing="2">WHAT WE FOUND</text>

  <!-- 发现卡片1 -->
  <rect x="30" y="130" width="350" height="100" rx="12" fill="#fff" filter="url(#shadow)"/>
  <rect x="30" y="130" width="6" height="100" rx="3" fill="#e94560"/>
  <text x="50" y="155" fill="#1e293b" font-size="14" font-weight="bold">27 行代码 = 实时质量信号</text>
  <text x="50" y="178" fill="#64748b" font-size="12">一个正则匹配 30+ 情绪词</text>
  <text x="50" y="198" fill="#64748b" font-size="12">每次用户输入都跑，回收率 100%</text>
  <text x="50" y="218" fill="#94a3b8" font-size="11">vs NPS 问卷回收率 &lt; 5%</text>

  <!-- 发现卡片2 -->
  <rect x="30" y="245" width="350" height="100" rx="12" fill="#fff" filter="url(#shadow)"/>
  <rect x="30" y="245" width="6" height="100" rx="3" fill="#f97316"/>
  <text x="50" y="270" fill="#1e293b" font-size="14" font-weight="bold">A/B 实验 + 情绪切片</text>
  <text x="50" y="293" fill="#64748b" font-size="12">is_negative 联动 44 个 feature flags</text>
  <text x="50" y="313" fill="#64748b" font-size="12">每个实验可按情绪信号分群评估</text>
  <text x="50" y="333" fill="#94a3b8" font-size="11">发现"转化率没掉但用户更 frustrated"</text>

  <!-- 发现卡片3 -->
  <rect x="30" y="360" width="350" height="100" rx="12" fill="#fff" filter="url(#shadow)"/>
  <rect x="30" y="360" width="6" height="100" rx="3" fill="#0ea5e9"/>
  <text x="50" y="385" fill="#1e293b" font-size="14" font-weight="bold">内外版编译隔离</text>
  <text x="50" y="408" fill="#64748b" font-size="12">ant-only: 沮丧→自动弹对话分享</text>
  <text x="50" y="428" fill="#64748b" font-size="12">external: 整个模块编译时消除</text>
  <text x="50" y="448" fill="#94a3b8" font-size="11">dogfooding 做到了零泄漏</text>

  <!-- 中间箭头区 -->
  <line x1="390" y1="290" x2="430" y2="290" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cbd5e1"/>
    </marker>
  </defs>

  <!-- 转化逻辑 -->
  <rect x="430" y="240" width="120" height="100" rx="60" fill="#1a1a2e" opacity="0.05"/>
  <text x="490" y="278" fill="#64748b" font-size="11" text-anchor="middle" font-weight="bold">所以呢？</text>
  <text x="490" y="298" fill="#94a3b8" font-size="10" text-anchor="middle">→ 产品化 →</text>
  <text x="490" y="318" fill="#94a3b8" font-size="10" text-anchor="middle">→ 可以卖 →</text>

  <line x1="550" y1="290" x2="590" y2="290" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 右半区：产品提案 -->
  <text x="610" y="115" fill="#64748b" font-size="12" font-weight="bold" letter-spacing="2">PRODUCT OPPORTUNITIES</text>

  <!-- 提案卡片1 -->
  <rect x="600" y="130" width="570" height="120" rx="12" fill="#fff" filter="url(#shadow)"/>
  <rect x="600" y="130" width="570" height="4" rx="2" fill="#e94560"/>
  <circle cx="630" cy="165" r="16" fill="#e94560" opacity="0.1"/>
  <text x="630" y="170" fill="#e94560" font-size="14" font-weight="bold" text-anchor="middle">1</text>
  <text x="660" y="165" fill="#1e293b" font-size="15" font-weight="bold">AI 体验质量探针 SDK</text>
  <text x="660" y="188" fill="#64748b" font-size="12">嵌入任何 AI 对话产品，实时检测沮丧信号，生成"体验质量分数"</text>
  <text x="660" y="208" fill="#64748b" font-size="12">目标客户：大模型应用 / 客服机器人 / Copilot（国内 500+ 潜在客户）</text>
  <rect x="660" y="218" width="180" height="24" rx="4" fill="#fef2f2"/>
  <text x="670" y="235" fill="#e94560" font-size="12" font-weight="bold">SaaS ¥299-999/月/产品</text>

  <!-- 提案卡片2 -->
  <rect x="600" y="265" width="570" height="120" rx="12" fill="#fff" filter="url(#shadow)"/>
  <rect x="600" y="265" width="570" height="4" rx="2" fill="#f97316"/>
  <circle cx="630" cy="300" r="16" fill="#f97316" opacity="0.1"/>
  <text x="630" y="305" fill="#f97316" font-size="14" font-weight="bold" text-anchor="middle">2</text>
  <text x="660" y="300" fill="#1e293b" font-size="15" font-weight="bold">A/B 实验情绪切片插件</text>
  <text x="660" y="323" fill="#64748b" font-size="12">给实验平台加"情绪维度"，发现"转化率没掉但体验退化"的隐性问题</text>
  <text x="660" y="343" fill="#64748b" font-size="12">适配：GrowthBook / 火山 A/B / 腾讯 ABTest</text>
  <rect x="660" y="353" width="260" height="24" rx="4" fill="#fff7ed"/>
  <text x="670" y="370" fill="#f97316" font-size="12" font-weight="bold">省 1-2 次大版本回滚成本</text>

  <!-- 提案卡片3 -->
  <rect x="600" y="400" width="570" height="120" rx="12" fill="#fff" filter="url(#shadow)"/>
  <rect x="600" y="400" width="570" height="4" rx="2" fill="#0ea5e9"/>
  <circle cx="630" cy="435" r="16" fill="#0ea5e9" opacity="0.1"/>
  <text x="630" y="440" fill="#0ea5e9" font-size="14" font-weight="bold" text-anchor="middle">3</text>
  <text x="660" y="435" fill="#1e293b" font-size="15" font-weight="bold">DX 监控仪表盘（CLI/SDK 场景）</text>
  <text x="660" y="458" fill="#64748b" font-size="12">针对终端工具场景的开发者体验监控，PostHog 覆盖不到的空白</text>
  <text x="660" y="478" fill="#64748b" font-size="12">实时仪表盘：哪个功能/流程让开发者最 frustrated</text>
  <rect x="660" y="488" width="150" height="24" rx="4" fill="#f0f9ff"/>
  <text x="670" y="505" fill="#0ea5e9" font-size="12" font-weight="bold">SaaS $49-199/月</text>

  <!-- 底部：关键判断 -->
  <rect x="30" y="550" width="1140" height="220" rx="12" fill="#1a1a2e"/>

  <text x="60" y="585" fill="#e2e8f0" font-size="16" font-weight="bold">关键判断</text>

  <!-- 判断1 -->
  <rect x="60" y="605" width="340" height="80" rx="8" fill="#ffffff10"/>
  <text x="80" y="630" fill="#e94560" font-size="13" font-weight="bold">为什么能做？</text>
  <text x="80" y="652" fill="#94a3b8" font-size="12">Anthropic 验证了"正则足够用"</text>
  <text x="80" y="672" fill="#94a3b8" font-size="12">不需要 LLM，成本几乎为零</text>

  <!-- 判断2 -->
  <rect x="430" y="605" width="340" height="80" rx="8" fill="#ffffff10"/>
  <text x="450" y="630" fill="#f97316" font-size="13" font-weight="bold">差异化在哪？</text>
  <text x="450" y="652" fill="#94a3b8" font-size="12">PostHog/Mixpanel 只看行为，不看情绪</text>
  <text x="450" y="672" fill="#94a3b8" font-size="12">NPS 问卷滞后且回收率 &lt; 5%</text>

  <!-- 判断3 -->
  <rect x="800" y="605" width="340" height="80" rx="8" fill="#ffffff10"/>
  <text x="820" y="630" fill="#0ea5e9" font-size="13" font-weight="bold">最大风险？</text>
  <text x="820" y="652" fill="#94a3b8" font-size="12">隐私合规 -- 用户不知道被检测</text>
  <text x="820" y="672" fill="#94a3b8" font-size="12">需要明确告知 or 本地化处理</text>

  <!-- 底部标注 -->
  <text x="60" y="745" fill="#475569" font-size="11">数据来源：Claude Code v2.1.88 源码逆向分析 | 27行正则 + 3条上报通道 + 44个feature flags + 0条与限额关联的代码</text>
  <text x="1140" y="745" fill="#64748b" font-size="11" text-anchor="end">muming@chinadaas | PM Lens</text>
</svg>