<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="PingFang SC, Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2383E2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4DB6AC" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" rx="12"/>
  <!-- Pulse rings -->
  <circle cx="400" cy="180" r="60" fill="none" stroke="#2383E2" stroke-width="1.5" opacity="0.2"/>
  <circle cx="400" cy="180" r="90" fill="none" stroke="#2383E2" stroke-width="1" opacity="0.15"/>
  <circle cx="400" cy="180" r="120" fill="none" stroke="#2383E2" stroke-width="0.8" opacity="0.1"/>
  <circle cx="400" cy="180" r="150" fill="none" stroke="#4DB6AC" stroke-width="0.5" opacity="0.08"/>
  <!-- Center icon -->
  <circle cx="400" cy="180" r="36" fill="url(#glow)" stroke="#2383E2" stroke-width="2"/>
  <text x="400" y="190" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="bold">K</text>
  <!-- Five subsystem dots -->
  <circle cx="340" cy="130" r="6" fill="#4DB6AC"/>
  <text x="340" y="115" text-anchor="middle" fill="#4DB6AC" font-size="10">Tick</text>
  <circle cx="460" cy="130" r="6" fill="#FFB020"/>
  <text x="460" y="115" text-anchor="middle" fill="#FFB020" font-size="10">Sleep</text>
  <circle cx="340" cy="230" r="6" fill="#EB5757"/>
  <text x="340" y="250" text-anchor="middle" fill="#EB5757" font-size="10">Brief</text>
  <circle cx="460" cy="230" r="6" fill="#9B59B6"/>
  <text x="460" y="250" text-anchor="middle" fill="#9B59B6" font-size="10">Dream</text>
  <circle cx="400" cy="270" r="6" fill="#2383E2"/>
  <text x="400" y="290" text-anchor="middle" fill="#2383E2" font-size="10">Cron</text>
  <!-- Lines to center -->
  <line x1="346" y1="134" x2="372" y2="166" stroke="#4DB6AC" stroke-width="0.8" opacity="0.4"/>
  <line x1="454" y1="134" x2="428" y2="166" stroke="#FFB020" stroke-width="0.8" opacity="0.4"/>
  <line x1="346" y1="226" x2="372" y2="194" stroke="#EB5757" stroke-width="0.8" opacity="0.4"/>
  <line x1="454" y1="226" x2="428" y2="194" stroke="#9B59B6" stroke-width="0.8" opacity="0.4"/>
  <line x1="400" y1="264" x2="400" y2="216" stroke="#2383E2" stroke-width="0.8" opacity="0.4"/>
  <!-- Series badge -->
  <rect x="280" y="20" width="240" height="28" rx="14" fill="#2383E2" opacity="0.15"/>
  <text x="400" y="39" text-anchor="middle" fill="#2383E2" font-size="12" font-weight="500">Claude Code 源码深度拆解 #5</text>
  <!-- Title -->
  <text x="400" y="350" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="bold">KAIROS</text>
  <text x="400" y="380" text-anchor="middle" fill="#AAAACC" font-size="16">7x24 后台 Daemon 的野心</text>
  <!-- Tagline -->
  <text x="400" y="408" text-anchor="middle" fill="#666688" font-size="11">从 request-response 到 always-on 的范式转换</text>
</svg>
