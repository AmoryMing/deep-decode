<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="PingFang SC, Inter, sans-serif">
  <rect width="800" height="480" fill="#FFFFFF" rx="12"/>
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#37352F" font-size="20" font-weight="bold">Tick-Sleep 成本权衡：AI 怎么管理自己的开销</text>
  <line x1="100" y1="55" x2="700" y2="55" stroke="#E8E8E8" stroke-width="1"/>

  <!-- Timeline axis -->
  <line x1="80" y1="140" x2="720" y2="140" stroke="#CCCCCC" stroke-width="1.5"/>
  <text x="80" y="165" fill="#999999" font-size="11">0 min</text>
  <text x="240" y="165" fill="#999999" font-size="11">5 min</text>
  <text x="400" y="165" fill="#999999" font-size="11">10 min</text>
  <text x="560" y="165" fill="#999999" font-size="11">15 min</text>
  <text x="700" y="165" fill="#999999" font-size="11">20 min</text>

  <!-- Cache zone -->
  <rect x="80" y="90" width="160" height="45" rx="4" fill="#4DB6AC" opacity="0.12"/>
  <text x="160" y="110" text-anchor="middle" fill="#4DB6AC" font-size="11" font-weight="500">Prompt Cache 有效</text>
  <!-- Cache expired zone -->
  <rect x="240" y="90" width="480" height="45" rx="4" fill="#EB5757" opacity="0.08"/>
  <text x="480" y="110" text-anchor="middle" fill="#EB5757" font-size="11" font-weight="500">Cache 过期 -- 下次调用更贵</text>
  <!-- 5min marker -->
  <line x1="240" y1="85" x2="240" y2="145" stroke="#EB5757" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="240" y="80" text-anchor="middle" fill="#EB5757" font-size="12" font-weight="bold">5 分钟临界点</text>

  <!-- Tick marks on timeline -->
  <circle cx="112" cy="140" r="4" fill="#2383E2"/>
  <circle cx="144" cy="140" r="4" fill="#2383E2"/>
  <circle cx="176" cy="140" r="4" fill="#2383E2"/>
  <circle cx="208" cy="140" r="4" fill="#2383E2"/>
  <text x="160" y="185" text-anchor="middle" fill="#2383E2" font-size="10">频繁唤醒 = API 费用高</text>

  <!-- Sparse ticks -->
  <circle cx="400" cy="140" r="4" fill="#FFB020"/>
  <circle cx="600" cy="140" r="4" fill="#FFB020"/>
  <text x="500" y="185" text-anchor="middle" fill="#FFB020" font-size="10">稀疏唤醒 = Cache 重建成本高</text>

  <!-- Two scenarios comparison -->
  <!-- Scenario A: Too frequent -->
  <rect x="60" y="210" width="320" height="120" rx="8" fill="#F7F7F5" stroke="#E8E8E8" stroke-width="1"/>
  <text x="220" y="235" text-anchor="middle" fill="#37352F" font-size="14" font-weight="bold">太频繁醒来</text>
  <text x="220" y="260" text-anchor="middle" fill="#666666" font-size="12">每 1 分钟唤醒一次</text>
  <text x="220" y="282" text-anchor="middle" fill="#EB5757" font-size="13" font-weight="500">1440 次/天 x $0.05 = $72/天</text>
  <text x="220" y="305" text-anchor="middle" fill="#999999" font-size="11">Cache 命中率高，但调用次数太多</text>
  <circle cx="85" cy="235" r="12" fill="#EB5757" opacity="0.15"/>
  <text x="85" y="240" text-anchor="middle" fill="#EB5757" font-size="16">A</text>

  <!-- Scenario B: Optimal -->
  <rect x="420" y="210" width="320" height="120" rx="8" fill="#2383E2" fill-opacity="0.05" stroke="#2383E2" stroke-width="1.5"/>
  <text x="580" y="235" text-anchor="middle" fill="#37352F" font-size="14" font-weight="bold">最优频率</text>
  <text x="580" y="260" text-anchor="middle" fill="#666666" font-size="12">每 4-5 分钟唤醒一次（卡在 cache 过期前）</text>
  <text x="580" y="282" text-anchor="middle" fill="#4DB6AC" font-size="13" font-weight="500">288-360 次/天 x $0.05 = $14-18/天</text>
  <text x="580" y="305" text-anchor="middle" fill="#999999" font-size="11">Cache 复用 + 调用最少 = 成本最优</text>
  <circle cx="445" cy="235" r="12" fill="#2383E2" opacity="0.15"/>
  <text x="445" y="240" text-anchor="middle" fill="#2383E2" font-size="16">B</text>

  <!-- Bottom insight -->
  <rect x="100" y="360" width="600" height="90" rx="8" fill="#FFF8E1" stroke="#FFB020" stroke-width="1"/>
  <text x="400" y="388" text-anchor="middle" fill="#37352F" font-size="14" font-weight="bold">核心洞察</text>
  <text x="400" y="412" text-anchor="middle" fill="#555555" font-size="12">SleepTool 不是一般的休眠工具 -- 它是 KAIROS 经济模型的核心枢纽</text>
  <text x="400" y="434" text-anchor="middle" fill="#555555" font-size="12">AI 需要自己算账、自己决定最优唤醒频率，本质是把成本优化交给了 AI 自己</text>
</svg>
