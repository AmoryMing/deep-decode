<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" font-family="PingFang SC, Inter, sans-serif">
  <rect width="800" height="500" fill="#F7F7F5" rx="0"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#37352F">推测执行：当 AI 编程助手学会了 CPU 的老把戏</text>
  <text x="400" y="68" text-anchor="middle" font-size="14" fill="#787774">Claude Code 源码拆解 #12</text>

  <!-- Divider -->
  <line x1="80" y1="84" x2="720" y2="84" stroke="#E3E2E0" stroke-width="1"/>

  <!-- LEFT: CPU Branch Prediction -->
  <rect x="40" y="100" width="340" height="320" rx="8" fill="#FFFFFF" stroke="#E3E2E0" stroke-width="1"/>
  <text x="210" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#2383E2">CPU 分支预测</text>

  <!-- Pipeline stages -->
  <rect x="70" y="150" width="56" height="32" rx="6" fill="#2383E2"/>
  <text x="98" y="171" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">IF</text>

  <text x="133" y="171" text-anchor="middle" font-size="14" fill="#787774">-></text>

  <rect x="142" y="150" width="56" height="32" rx="6" fill="#2383E2"/>
  <text x="170" y="171" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">ID</text>

  <text x="205" y="171" text-anchor="middle" font-size="14" fill="#787774">-></text>

  <rect x="214" y="150" width="56" height="32" rx="6" fill="#2383E2"/>
  <text x="242" y="171" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">EX</text>

  <text x="277" y="171" text-anchor="middle" font-size="14" fill="#787774">-></text>

  <rect x="286" y="150" width="56" height="32" rx="6" fill="#2383E2"/>
  <text x="314" y="171" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">MEM</text>

  <!-- Branch point -->
  <rect x="142" y="205" width="128" height="32" rx="6" fill="#FFB020" stroke="#FFB020" stroke-width="1"/>
  <text x="206" y="226" text-anchor="middle" font-size="13" fill="#37352F" font-weight="bold">分支点: 猜!</text>

  <!-- Arrow down from EX -->
  <line x1="206" y1="182" x2="206" y2="205" stroke="#787774" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Guess right -->
  <line x1="150" y1="237" x2="120" y2="270" stroke="#4DB6AC" stroke-width="1.5"/>
  <rect x="60" y="270" width="130" height="36" rx="8" fill="#4DB6AC"/>
  <text x="125" y="293" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">猜对 -> 继续</text>

  <!-- Pipeline continues -->
  <rect x="60" y="320" width="56" height="28" rx="6" fill="#4DB6AC" opacity="0.6"/>
  <text x="88" y="339" text-anchor="middle" font-size="12" fill="#FFFFFF">WB</text>
  <text x="125" y="339" text-anchor="middle" font-size="12" fill="#787774">流水线满载</text>

  <!-- Guess wrong -->
  <line x1="262" y1="237" x2="292" y2="270" stroke="#EB5757" stroke-width="1.5"/>
  <rect x="230" y="270" width="130" height="36" rx="8" fill="#EB5757"/>
  <text x="295" y="293" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">猜错 -> 丢弃</text>

  <!-- Flush -->
  <rect x="230" y="320" width="130" height="28" rx="6" fill="#EB5757" opacity="0.3"/>
  <text x="295" y="339" text-anchor="middle" font-size="12" fill="#EB5757">Flush 重来</text>

  <!-- Stats -->
  <text x="210" y="390" text-anchor="middle" font-size="12" fill="#787774">现代 CPU 预测准确率 > 95%</text>
  <text x="210" y="408" text-anchor="middle" font-size="12" fill="#787774">猜错代价: 几十个时钟周期</text>

  <!-- CENTER: equals sign -->
  <rect x="388" y="230" width="24" height="40" rx="4" fill="#9B51E0"/>
  <text x="400" y="256" text-anchor="middle" font-size="20" font-weight="bold" fill="#FFFFFF">=</text>
  <text x="400" y="290" text-anchor="middle" font-size="11" fill="#9B51E0" font-weight="bold">同一个逻辑</text>

  <!-- RIGHT: AI Intent Prediction -->
  <rect x="420" y="100" width="340" height="320" rx="8" fill="#FFFFFF" stroke="#E3E2E0" stroke-width="1"/>
  <text x="590" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#9B51E0">AI 意图预测</text>

  <!-- Pipeline stages -->
  <rect x="440" y="150" width="64" height="32" rx="6" fill="#9B51E0"/>
  <text x="472" y="171" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="bold">预测</text>

  <text x="512" y="171" text-anchor="middle" font-size="14" fill="#787774">-></text>

  <rect x="522" y="150" width="64" height="32" rx="6" fill="#9B51E0"/>
  <text x="554" y="171" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="bold">Fork</text>

  <text x="594" y="171" text-anchor="middle" font-size="14" fill="#787774">-></text>

  <rect x="604" y="150" width="80" height="32" rx="6" fill="#9B51E0"/>
  <text x="644" y="171" text-anchor="middle" font-size="12" fill="#FFFFFF" font-weight="bold">沙箱执行</text>

  <!-- Verify point -->
  <rect x="522" y="205" width="128" height="32" rx="6" fill="#FFB020"/>
  <text x="586" y="226" text-anchor="middle" font-size="13" fill="#37352F" font-weight="bold">验证: 用户确认</text>

  <line x1="586" y1="182" x2="586" y2="205" stroke="#787774" stroke-width="1.5"/>

  <!-- Accept -->
  <line x1="530" y1="237" x2="500" y2="270" stroke="#4DB6AC" stroke-width="1.5"/>
  <rect x="440" y="270" width="130" height="36" rx="8" fill="#4DB6AC"/>
  <text x="505" y="293" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">接受 -> 提交</text>

  <rect x="440" y="320" width="130" height="28" rx="6" fill="#4DB6AC" opacity="0.6"/>
  <text x="505" y="339" text-anchor="middle" font-size="12" fill="#FFFFFF">结果即时生效</text>

  <!-- Reject -->
  <line x1="642" y1="237" x2="668" y2="270" stroke="#EB5757" stroke-width="1.5"/>
  <rect x="610" y="270" width="130" height="36" rx="8" fill="#EB5757"/>
  <text x="675" y="293" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold">拒绝 -> 丢弃</text>

  <rect x="610" y="320" width="130" height="28" rx="6" fill="#EB5757" opacity="0.3"/>
  <text x="675" y="339" text-anchor="middle" font-size="12" fill="#EB5757">沙箱结果销毁</text>

  <!-- Stats -->
  <text x="590" y="390" text-anchor="middle" font-size="12" fill="#787774">用户感知延迟: 接近 0</text>
  <text x="590" y="408" text-anchor="middle" font-size="12" fill="#787774">猜错代价: 几次 API 调用</text>

  <!-- Bottom bar -->
  <rect x="0" y="440" width="800" height="60" fill="#37352F" rx="0"/>
  <text x="400" y="468" text-anchor="middle" font-size="13" fill="#FFFFFF">
    <tspan>内部代号 Tengu</tspan>
    <tspan dx="24" fill="#787774">|</tspan>
    <tspan dx="24">仅 Anthropic 内部可用</tspan>
    <tspan dx="24" fill="#787774">|</tspan>
    <tspan dx="24">源码 992 行</tspan>
  </text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#787774"/>
    </marker>
  </defs>
</svg>