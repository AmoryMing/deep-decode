<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" font-family="PingFang SC, Inter, sans-serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#37352F">三层推测流水线: 系统性消除等待</text>

  <!-- Time axis -->
  <line x1="60" y1="70" x2="620" y2="70" stroke="#787774" stroke-width="1.5"/>
  <polygon points="620,66 630,70 620,74" fill="#787774"/>
  <text x="640" y="74" font-size="12" fill="#787774">时间</text>
  <!-- Ticks -->
  <line x1="60" y1="66" x2="60" y2="74" stroke="#787774" stroke-width="1"/>
  <line x1="200" y1="66" x2="200" y2="74" stroke="#787774" stroke-width="1"/>
  <line x1="340" y1="66" x2="340" y2="74" stroke="#787774" stroke-width="1"/>
  <line x1="480" y1="66" x2="480" y2="74" stroke="#787774" stroke-width="1"/>
  <text x="60" y="62" font-size="10" fill="#787774" text-anchor="middle">0</text>
  <text x="200" y="62" font-size="10" fill="#787774" text-anchor="middle">流式输出中</text>
  <text x="340" y="62" font-size="10" fill="#787774" text-anchor="middle">响应完成</text>
  <text x="480" y="62" font-size="10" fill="#787774" text-anchor="middle">工具执行</text>

  <!-- === Parallel Pipeline Section === -->
  <text x="40" y="100" font-size="13" font-weight="bold" fill="#37352F">并行流水线</text>

  <!-- Row: Model streaming output (blue) -->
  <text x="60" y="128" font-size="12" fill="#37352F">模型流式输出</text>
  <rect x="60" y="134" width="400" height="24" rx="4" fill="#2383E2" opacity="0.85"/>
  <text x="260" y="150" text-anchor="middle" font-size="11" fill="#FFFFFF">模型生成 token 流</text>

  <!-- Layer 1: Bash classifier prefetch (orange) -->
  <text x="60" y="180" font-size="12" fill="#37352F">Layer 1: Bash分类器预取</text>
  <rect x="80" y="186" width="100" height="22" rx="4" fill="#FFB020" opacity="0.9"/>
  <text x="130" y="201" text-anchor="middle" font-size="10" fill="#37352F">Bash分类</text>
  <rect x="190" y="188" width="70" height="18" rx="8" fill="none" stroke="#FFB020" stroke-width="1"/>
  <text x="225" y="201" text-anchor="middle" font-size="10" fill="#FFB020">微秒级</text>

  <!-- Layer 2: Memory/Skill prefetch (purple) -->
  <text x="60" y="230" font-size="12" fill="#37352F">Layer 2: Memory/Skill预取</text>
  <rect x="60" y="236" width="180" height="22" rx="4" fill="#9B51E0" opacity="0.8"/>
  <text x="150" y="251" text-anchor="middle" font-size="10" fill="#FFFFFF">Memory + Skill 预加载</text>
  <rect x="250" y="238" width="200" height="18" rx="8" fill="none" stroke="#9B51E0" stroke-width="1"/>
  <text x="350" y="251" text-anchor="middle" font-size="10" fill="#9B51E0">百毫秒级, 97%空命中 → 藏到推理时间</text>

  <!-- Layer 3: Speculative execution (green) -->
  <text x="60" y="280" font-size="12" fill="#37352F">Layer 3: 推测执行+Pipelining</text>
  <rect x="340" y="286" width="270" height="22" rx="4" fill="#4DB6AC" opacity="0.85"/>
  <text x="475" y="301" text-anchor="middle" font-size="10" fill="#FFFFFF">递归: 预测 → 执行 → 预测</text>
  <rect x="340" y="312" width="130" height="18" rx="8" fill="none" stroke="#4DB6AC" stroke-width="1"/>
  <text x="405" y="325" text-anchor="middle" font-size="10" fill="#4DB6AC">秒级, 递归预测</text>

  <!-- Separator -->
  <line x1="40" y1="350" x2="630" y2="350" stroke="#E3E2E0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- === Sequential Section === -->
  <text x="40" y="372" font-size="13" font-weight="bold" fill="#787774">传统串行模式</text>

  <rect x="60" y="382" width="120" height="20" rx="4" fill="#E3E2E0"/>
  <text x="120" y="396" text-anchor="middle" font-size="10" fill="#787774">模型输出</text>

  <rect x="185" y="382" width="80" height="20" rx="4" fill="#E3E2E0"/>
  <text x="225" y="396" text-anchor="middle" font-size="10" fill="#787774">Bash分类</text>

  <rect x="270" y="382" width="100" height="20" rx="4" fill="#E3E2E0"/>
  <text x="320" y="396" text-anchor="middle" font-size="10" fill="#787774">Memory加载</text>

  <rect x="375" y="382" width="120" height="20" rx="4" fill="#E3E2E0"/>
  <text x="435" y="396" text-anchor="middle" font-size="10" fill="#787774">工具执行</text>

  <rect x="500" y="382" width="110" height="20" rx="4" fill="#E3E2E0"/>
  <text x="555" y="396" text-anchor="middle" font-size="10" fill="#787774">下一轮预测</text>

  <!-- Arrows showing total time comparison -->
  <line x1="60" y1="415" x2="610" y2="415" stroke="#EB5757" stroke-width="1.5"/>
  <text x="635" y="419" font-size="11" fill="#EB5757">慢</text>

  <line x1="60" y1="312" x2="610" y2="312" stroke="#4DB6AC" stroke-width="0" opacity="0"/>

  <!-- Right side annotation -->
  <rect x="645" y="120" width="140" height="90" rx="8" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="715" y="145" text-anchor="middle" font-size="11" fill="#37352F" font-weight="bold">
    <tspan x="715" dy="0">人类思考的</tspan>
    <tspan x="715" dy="18">每一毫秒,</tspan>
    <tspan x="715" dy="18">机器都不应该</tspan>
    <tspan x="715" dy="18">闲着</tspan>
  </text>

  <!-- Legend -->
  <rect x="60" y="440" width="12" height="12" rx="2" fill="#FFB020"/>
  <text x="78" y="451" font-size="11" fill="#787774">Layer 1</text>
  <rect x="140" y="440" width="12" height="12" rx="2" fill="#9B51E0"/>
  <text x="158" y="451" font-size="11" fill="#787774">Layer 2</text>
  <rect x="220" y="440" width="12" height="12" rx="2" fill="#4DB6AC"/>
  <text x="238" y="451" font-size="11" fill="#787774">Layer 3</text>
  <rect x="320" y="440" width="12" height="12" rx="2" fill="#E3E2E0"/>
  <text x="338" y="451" font-size="11" fill="#787774">串行(浪费)</text>

  <!-- Bottom border -->
  <rect x="0" y="496" width="800" height="4" fill="#2383E2" opacity="0.3"/>
</svg>