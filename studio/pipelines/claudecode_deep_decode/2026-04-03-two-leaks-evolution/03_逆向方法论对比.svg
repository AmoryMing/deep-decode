  <text x="652" y="126" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" font-weight="bold" fill="#37352F">Chaofan Shou | 2026.03</text>
  <line x1="564" y1="136" x2="739" y2="136" stroke="#EB5757" stroke-width="0.5" opacity="0.3"/>

