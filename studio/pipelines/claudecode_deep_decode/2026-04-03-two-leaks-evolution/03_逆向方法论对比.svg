  <text x="50" y="158" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#37352F" font-weight="bold">方法</text>
  <text x="50" y="175" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#666">用 Claude 反编译 Claude</text>
