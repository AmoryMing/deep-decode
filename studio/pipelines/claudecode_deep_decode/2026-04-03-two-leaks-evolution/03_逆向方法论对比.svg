  <text x="50" y="351" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#666">不再是安全屏障</text>

  <!-- Column 2: Manual Reverse -->
  <rect x="282" y="60" width="235" height="340" rx="12" fill="#FFF8E1" stroke="#FFB020" stroke-width="1.5"/>
