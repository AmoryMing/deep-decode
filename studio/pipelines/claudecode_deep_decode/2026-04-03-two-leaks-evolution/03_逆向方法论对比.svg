  <text x="400" y="126" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" font-weight="bold" fill="#37352F">kolkov 团队 | 2026</text>
  <line x1="312" y1="136" x2="487" y2="136" stroke="#FFB020" stroke-width="0.5" opacity="0.3"/>

