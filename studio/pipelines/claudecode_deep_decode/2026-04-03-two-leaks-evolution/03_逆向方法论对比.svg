  <rect x="554" y="226" width="30" height="6" rx="3" fill="#4DB6AC"/>
  <text x="592" y="232" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#666">极低</text>

  <text x="554" y="258" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#37352F" font-weight="bold">看到什么</text>
