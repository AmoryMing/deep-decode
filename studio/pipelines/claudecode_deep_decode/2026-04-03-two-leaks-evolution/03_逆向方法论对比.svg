  <text x="302" y="351" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#666">源码审查看不到的真相</text>

  <!-- Column 3: Sourcemap -->
  <rect x="534" y="60" width="235" height="340" rx="12" fill="#FDECEC" stroke="#EB5757" stroke-width="1.5"/>
  <rect x="534" y="60" width="235" height="44" rx="12" fill="#EB5757"/>
