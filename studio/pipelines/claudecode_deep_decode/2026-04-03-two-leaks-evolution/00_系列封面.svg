<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7F7F5"/>
      <stop offset="100%" stop-color="#EEEEE9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="48" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="15" fill="#999" letter-spacing="3">CLAUDE CODE 源码拆解系列</text>
  <text x="400" y="88" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="26" font-weight="bold" fill="#37352F">两次泄露的技术演进</text>
  <text x="400" y="118" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#999">同一个错误，14 个月，两份完全不同的"遗产"</text>

  <!-- v0.2.8 circle (small) -->
  <circle cx="230" cy="270" r="55" fill="none" stroke="#2383E2" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="230" y="260" text-anchor="middle" font-family="Inter, PingFang SC, sans-serif" font-size="22" font-weight="bold" fill="#2383E2">v0.2.8</text>
  <text x="230" y="284" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#666">2025.02</text>
  <text x="230" y="342" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#999">单文件 CLI</text>
  <text x="230" y="360" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#999">base64 sourcemap</text>

  <!-- Arrow -->
  <line x1="300" y1="270" x2="390" y2="270" stroke="#37352F" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="345" y="258" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#EB5757" font-weight="bold">14 个月</text>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#37352F"/>
    </marker>
  </defs>

  <!-- v2.1.88 circle (large) -->
  <circle cx="520" cy="270" r="110" fill="none" stroke="#EB5757" stroke-width="2.5"/>
  <text x="520" y="250" text-anchor="middle" font-family="Inter, PingFang SC, sans-serif" font-size="28" font-weight="bold" fill="#EB5757">v2.1.88</text>
  <text x="520" y="278" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#666">2026.03.31</text>
  <text x="520" y="302" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" font-weight="bold">1,902 文件</text>
  <text x="520" y="322" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" font-weight="bold">512,685 行</text>

  <!-- Data labels around large circle -->
  <text x="660" y="200" text-anchor="start" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#666">40+ 工具</text>
  <text x="660" y="220" text-anchor="start" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#666">44 feature flags</text>
  <text x="660" y="240" text-anchor="start" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#666">9,300 行安全代码</text>
  <text x="660" y="260" text-anchor="start" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#666">三层 Agent 架构</text>
  <text x="660" y="280" text-anchor="start" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#666">autoDream 记忆引擎</text>
  <text x="660" y="300" text-anchor="start" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#666">KAIROS 后台模式</text>

  <!-- connector lines -->
  <line x1="628" y1="220" x2="655" y2="220" stroke="#ccc" stroke-width="0.8"/>
  <line x1="628" y1="260" x2="655" y2="260" stroke="#ccc" stroke-width="0.8"/>
  <line x1="628" y1="280" x2="655" y2="280" stroke="#ccc" stroke-width="0.8"/>

  <!-- Bottom tag -->
  <rect x="280" y="410" width="240" height="28" rx="14" fill="#37352F"/>
  <text x="400" y="429" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#fff">从婴儿到怪物的 14 个月</text>
</svg>
