<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="PingFang SC, Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)" rx="12"/>
  <!-- Mask icon -->
  <g transform="translate(400,170)">
    <ellipse cx="0" cy="0" rx="50" ry="30" fill="none" stroke="#9B59B6" stroke-width="2.5" opacity="0.8"/>
    <circle cx="-18" cy="-2" r="8" fill="#9B59B6" opacity="0.3"/>
    <circle cx="18" cy="-2" r="8" fill="#9B59B6" opacity="0.3"/>
    <circle cx="-18" cy="-2" r="3" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="18" cy="-2" r="3" fill="#FFFFFF" opacity="0.9"/>
    <path d="M -15 12 Q 0 20 15 12" fill="none" stroke="#9B59B6" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- Crossed out Co-Authored-By -->
  <g transform="translate(400,240)">
    <text x="0" y="0" text-anchor="middle" fill="#555577" font-size="11" font-family="monospace">Co-Authored-By: Claude Opus 4.6</text>
    <line x1="-120" y1="-4" x2="120" y2="-4" stroke="#EB5757" stroke-width="2" opacity="0.7"/>
  </g>
  <!-- Series badge -->
  <rect x="280" y="20" width="240" height="28" rx="14" fill="#9B59B6" opacity="0.15"/>
  <text x="400" y="39" text-anchor="middle" fill="#9B59B6" font-size="12" font-weight="500">Claude Code 源码深度拆解 #6</text>
  <!-- Title -->
  <text x="400" y="320" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="bold">Undercover Mode</text>
  <text x="400" y="352" text-anchor="middle" fill="#AAAACC" font-size="16">Anthropic 员工的隐身衣</text>
  <!-- Tagline -->
  <text x="400" y="400" text-anchor="middle" fill="#666688" font-size="11">同一套源码：一边抹掉 AI 身份，一边追踪 AI 贡献到字符级</text>
</svg>
