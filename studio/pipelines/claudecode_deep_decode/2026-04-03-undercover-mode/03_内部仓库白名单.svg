  <text x="305" y="280" fill="#37352F" font-size="11" font-family="monospace">anthropic (主仓库)</text>
  <text x="305" y="300" fill="#37352F" font-size="11" font-family="monospace">claude-for-hiring</text>
  <text x="305" y="320" fill="#37352F" font-size="11" font-family="monospace">feedback-v2</text>
