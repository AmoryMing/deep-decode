  <text x="60" y="135" fill="#37352F" font-size="11" font-family="monospace">claude-cli-internal</text>
  <text x="60" y="155" fill="#37352F" font-size="11" font-family="monospace">apps</text>
  <text x="60" y="175" fill="#37352F" font-size="11" font-family="monospace">forge-web</text>
  <text x="60" y="195" fill="#37352F" font-size="11" font-family="monospace">mobile-apps</text>
  <text x="60" y="212" fill="#999999" font-size="9">CLI 内部版 / Web / 移动端</text>

  <!-- Category: Infrastructure -->
  <rect x="285" y="90" width="230" height="130" rx="8" fill="#4DB6AC" fill-opacity="0.05" stroke="#4DB6AC" stroke-width="1"/>
