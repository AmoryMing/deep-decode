  <text x="305" y="135" fill="#37352F" font-size="11" font-family="monospace">terraform-config</text>
  <text x="305" y="155" fill="#37352F" font-size="11" font-family="monospace">infra-manifests</text>
  <text x="305" y="175" fill="#37352F" font-size="11" font-family="monospace">mycro_manifests</text>
  <text x="305" y="195" fill="#37352F" font-size="11" font-family="monospace">argo-rollouts</text>
