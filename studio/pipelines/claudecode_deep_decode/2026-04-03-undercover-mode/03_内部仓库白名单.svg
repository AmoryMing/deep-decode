<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="PingFang SC, Inter, sans-serif">
  <rect width="800" height="440" fill="#FFFFFF" rx="12"/>
  <text x="400" y="38" text-anchor="middle" fill="#37352F" font-size="20" font-weight="bold">21 个内部仓库：Anthropic 的组织拼图</text>
  <line x1="100" y1="52" x2="700" y2="52" stroke="#E8E8E8" stroke-width="1"/>
  <text x="400" y="72" text-anchor="middle" fill="#999999" font-size="11">Undercover Mode 关闭 = 允许 AI 归属 = 确认私有</text>

  <!-- Category: Core Product -->
  <rect x="40" y="90" width="230" height="130" rx="8" fill="#2383E2" fill-opacity="0.05" stroke="#2383E2" stroke-width="1"/>
