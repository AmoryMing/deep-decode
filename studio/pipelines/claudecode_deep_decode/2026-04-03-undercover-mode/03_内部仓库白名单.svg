  <text x="550" y="280" fill="#37352F" font-size="11" font-family="monospace">dotfiles</text>
  <text x="550" y="300" fill="#37352F" font-size="11" font-family="monospace">casino</text>
  <text x="550" y="320" fill="#37352F" font-size="11" font-family="monospace">mycro_configs</text>
  <text x="550" y="337" fill="#999999" font-size="9">开发环境 / 实验平台 / 微服务配置</text>

  <!-- Bottom callout -->
  <rect x="100" y="365" width="600" height="55" rx="8" fill="#FFF8E1" stroke="#FFB020" stroke-width="1"/>
  <text x="400" y="388" text-anchor="middle" fill="#37352F" font-size="12" font-weight="bold">关键细节：anthropics/claude-code 是公共仓库，不在白名单上</text>
  <text x="400" y="408" text-anchor="middle" fill="#555555" font-size="11">Anthropic 员工在自家产品的公开仓库工作时，Undercover Mode 也是启用的</text>
</svg>
