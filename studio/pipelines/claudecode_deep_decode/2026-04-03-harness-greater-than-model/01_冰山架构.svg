<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800" height="580">
  <rect width="800" height="580" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="40" font-family="PingFang SC, Inter, sans-serif" font-size="22" fill="#37352F" text-anchor="middle" font-weight="700">Claude Code 的冰山架构</text>
  <text x="400" y="65" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#787774" text-anchor="middle">你看到的 vs 实际在运行的</text>

  <!-- Water line -->
  <line x1="80" y1="180" x2="720" y2="180" stroke="#2383E2" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
  <text x="740" y="185" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#2383E2" text-anchor="end">用户可见</text>

  <!-- Above water - small tip -->
  <polygon points="400,95 340,175 460,175" fill="#4DB6AC" opacity="0.15" stroke="#4DB6AC" stroke-width="2" stroke-linejoin="round"/>
  <text x="400" y="145" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#37352F" text-anchor="middle" font-weight="600">终端对话框</text>
  <text x="400" y="165" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774" text-anchor="middle">~6,400 行</text>

  <!-- Below water - massive structure -->
  <polygon points="400,185 140,540 660,540" fill="#2383E2" opacity="0.08" stroke="#2383E2" stroke-width="2" stroke-linejoin="round"/>

  <!-- Layer labels inside iceberg -->
  <rect x="280" y="210" width="240" height="36" rx="6" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="400" y="233" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle" font-weight="600">utils/ - 180K 行</text>
  <text x="545" y="233" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">权限/安全/模型管理</text>

  <rect x="260" y="260" width="280" height="36" rx="6" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="400" y="283" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle" font-weight="600">components/ - 81K 行</text>
  <text x="565" y="283" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">144 个 UI 组件</text>

  <rect x="240" y="310" width="320" height="36" rx="6" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="400" y="333" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle" font-weight="600">services/ - 53K 行</text>
  <text x="585" y="333" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">API/MCP/OAuth/压缩</text>

  <rect x="220" y="360" width="360" height="36" rx="6" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="400" y="383" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle" font-weight="600">tools/ - 50K 行</text>
  <text x="605" y="383" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">40+ Agent 工具</text>

  <rect x="200" y="410" width="400" height="36" rx="6" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="400" y="433" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle" font-weight="600">hooks/ + bridge/ + commands/ + ...</text>
  <text x="625" y="433" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">148K 行</text>

  <!-- Percentage labels -->
  <rect x="650" y="115" width="90" height="50" rx="8" fill="#4DB6AC" opacity="0.15"/>
  <text x="695" y="140" font-family="Inter, PingFang SC, sans-serif" font-size="18" fill="#4DB6AC" text-anchor="middle" font-weight="700">1.2%</text>
  <text x="695" y="156" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#4DB6AC" text-anchor="middle">LLM 交互</text>

  <rect x="650" y="460" width="90" height="50" rx="8" fill="#2383E2" opacity="0.15"/>
  <text x="695" y="485" font-family="Inter, PingFang SC, sans-serif" font-size="18" fill="#2383E2" text-anchor="middle" font-weight="700">98.8%</text>
  <text x="695" y="501" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#2383E2" text-anchor="middle">Harness</text>

  <!-- Bottom insight -->
  <rect x="120" y="535" width="560" height="30" rx="4" fill="#F7F7F5"/>
  <text x="400" y="555" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" text-anchor="middle">50 万行代码在做一件事：让模型的输出从"大概对"变成"稳定对"</text>
</svg>
