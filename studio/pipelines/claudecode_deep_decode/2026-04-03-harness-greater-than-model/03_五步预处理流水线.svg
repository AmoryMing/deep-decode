<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540">
  <rect width="800" height="540" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="38" font-family="PingFang SC, Inter, sans-serif" font-size="20" fill="#37352F" text-anchor="middle" font-weight="700">五步预处理流水线：模型开口前的工作</text>
  <text x="400" y="60" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#787774" text-anchor="middle">每轮 API 调用前，query.ts 自动执行的上下文治理</text>

  <!-- Step 1: Snip -->
  <rect x="50" y="90" width="130" height="100" rx="8" fill="#2383E2" opacity="0.1" stroke="#2383E2" stroke-width="2"/>
  <text x="115" y="115" font-family="PingFang SC, Inter, sans-serif" font-size="15" fill="#2383E2" text-anchor="middle" font-weight="700">Snip</text>
  <text x="115" y="138" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#37352F" text-anchor="middle">裁掉过时的</text>
  <text x="115" y="155" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#37352F" text-anchor="middle">工具调用结果</text>
  <text x="115" y="180" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774" text-anchor="middle">传递裁剪量给后续</text>

  <!-- Arrow 1 -->
  <line x1="185" y1="140" x2="205" y2="140" stroke="#E3E2E0" stroke-width="2"/>
  <polygon points="205,134 217,140 205,146" fill="#E3E2E0"/>

  <!-- Step 2: MicroCompact -->
  <rect x="220" y="90" width="130" height="100" rx="8" fill="#4DB6AC" opacity="0.1" stroke="#4DB6AC" stroke-width="2"/>
  <text x="285" y="110" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#4DB6AC" text-anchor="middle" font-weight="700">MicroCompact</text>
  <text x="285" y="133" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#37352F" text-anchor="middle" font-weight="600">微压缩</text>
  <text x="285" y="155" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#37352F" text-anchor="middle">就地缩减过长</text>
  <text x="285" y="172" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#37352F" text-anchor="middle">工具返回内容</text>
  <text x="285" y="185" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774" text-anchor="middle">用户完全透明</text>

  <!-- Arrow 2 -->
  <line x1="355" y1="140" x2="375" y2="140" stroke="#E3E2E0" stroke-width="2"/>
  <polygon points="375,134 387,140 375,146" fill="#E3E2E0"/>

  <!-- Step 3: Context Collapse -->
  <rect x="390" y="90" width="130" height="100" rx="8" fill="#FFB020" opacity="0.1" stroke="#FFB020" stroke-width="2"/>
  <text x="455" y="110" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#FFB020" text-anchor="middle" font-weight="700">Collapse</text>
  <text x="455" y="133" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#37352F" text-anchor="middle" font-weight="600">上下文折叠</text>
  <text x="455" y="155" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#37352F" text-anchor="middle">折叠早期对话</text>
  <text x="455" y="172" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#37352F" text-anchor="middle">只保留摘要</text>
  <text x="455" y="185" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774" text-anchor="middle">刻意在压缩前执行</text>

  <!-- Arrow 3 -->
  <line x1="525" y1="140" x2="545" y2="140" stroke="#E3E2E0" stroke-width="2"/>
  <polygon points="545,134 557,140 545,146" fill="#E3E2E0"/>

  <!-- Step 4: AutoCompact -->
  <rect x="560" y="90" width="130" height="100" rx="8" fill="#9B51E0" opacity="0.1" stroke="#9B51E0" stroke-width="2"/>
  <text x="625" y="110" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#9B51E0" text-anchor="middle" font-weight="700">AutoCompact</text>
  <text x="625" y="133" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#37352F" text-anchor="middle" font-weight="600">自动压缩</text>
  <text x="625" y="155" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#37352F" text-anchor="middle">接近窗口上限</text>
  <text x="625" y="172" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#37352F" text-anchor="middle">AI 生成摘要</text>
  <text x="625" y="185" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774" text-anchor="middle">预留 20K token</text>

  <!-- Final arrow down -->
  <line x1="400" y1="200" x2="400" y2="235" stroke="#37352F" stroke-width="2"/>
  <polygon points="394,235 400,247 406,235" fill="#37352F"/>

  <!-- Step 5: Assemble -->
  <rect x="200" y="250" width="400" height="60" rx="8" fill="#37352F"/>
  <text x="400" y="278" font-family="PingFang SC, Inter, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="600">5. 组装请求 → 调用 Claude API</text>
  <text x="400" y="298" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#E3E2E0" text-anchor="middle">经过四步治理的上下文 + 当前输入 + System Prompt</text>

  <!-- Key insight box -->
  <rect x="80" y="340" width="640" height="90" rx="8" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="100" y="365" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#37352F" font-weight="600">设计哲学</text>
  <text x="100" y="390" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F">能不让模型看到的东西，就不让它看到。不是窗口不够大，而是无关信息分散注意力。</text>
  <text x="100" y="415" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#787774">源码注释："if collapse gets us under the threshold, autocompact is a no-op"</text>

  <!-- Dependency annotations -->
  <text x="50" y="470" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" font-weight="600">步骤间的依赖关系（不是简单串行）</text>

  <rect x="50" y="485" width="320" height="22" rx="4" fill="#2383E2" opacity="0.08"/>
  <text x="60" y="501" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#2383E2">Snip 裁剪量 → 传给 AutoCompact 做阈值判断</text>

  <rect x="50" y="510" width="380" height="22" rx="4" fill="#FFB020" opacity="0.08"/>
  <text x="60" y="526" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#FFB020">Collapse 先跑 → 够了就不触发 AutoCompact → 保留细粒度上下文</text>
</svg>
