<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs><style>text { font-family: PingFang SC, Inter, sans-serif; }</style></defs>
  <rect width="800" height="300" fill="#FFFFFF"/>

  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#37352F">泄露时间线：两周内三次事故</text>

  <!-- Timeline axis -->
  <line x1="60" y1="160" x2="740" y2="160" stroke="#DDD" stroke-width="2"/>

  <!-- 2025-02 -->
  <circle cx="100" cy="160" r="8" fill="#999"/>
  <text x="100" y="140" text-anchor="middle" font-size="10" font-weight="bold" fill="#999">2025-02</text>
  <text x="100" y="195" text-anchor="middle" font-size="9" fill="#666">v0.2.8</text>
  <text x="100" y="210" text-anchor="middle" font-size="9" fill="#666">base64 sourcemap</text>
  <text x="100" y="225" text-anchor="middle" font-size="9" fill="#666">ghuntley cleanroom</text>

  <!-- 2026-03-26 -->
  <circle cx="380" cy="160" r="8" fill="#FFB020"/>
  <text x="380" y="100" text-anchor="middle" font-size="10" font-weight="bold" fill="#E6930A">2026-03-26</text>
  <text x="380" y="115" text-anchor="middle" font-size="9" fill="#666">CMS 配置错误</text>
  <text x="380" y="130" text-anchor="middle" font-size="9" fill="#666">3000 内部资产</text>
  <text x="380" y="145" text-anchor="middle" font-size="9" fill="#666">Mythos(Capybara) 曝光</text>

  <!-- 2026-03-31 -->
  <circle cx="520" cy="160" r="12" fill="#EB5757"/>
  <text x="520" y="195" text-anchor="middle" font-size="10" font-weight="bold" fill="#EB5757">2026-03-31</text>
  <text x="520" y="210" text-anchor="middle" font-size="9" fill="#EB5757">v2.1.88 完整泄露</text>
  <text x="520" y="225" text-anchor="middle" font-size="9" fill="#EB5757">512K 行 / 1900 文件</text>
  <text x="520" y="240" text-anchor="middle" font-size="9" fill="#EB5757">+ axios RAT 供应链攻击</text>

  <!-- 2026-04-01 -->
  <circle cx="640" cy="160" r="8" fill="#7C4DFF"/>
  <text x="640" y="100" text-anchor="middle" font-size="10" font-weight="bold" fill="#7C4DFF">2026-04-01</text>
  <text x="640" y="115" text-anchor="middle" font-size="9" fill="#666">DMCA 下架</text>
  <text x="640" y="130" text-anchor="middle" font-size="9" fill="#666">deprecated (非 unpublish!)</text>

  <!-- Brackets -->
  <line x1="380" y1="260" x2="520" y2="260" stroke="#EB5757" stroke-width="1.5"/>
  <text x="450" y="278" text-anchor="middle" font-size="10" font-weight="bold" fill="#EB5757">5 天内两次泄露</text>

  <line x1="100" y1="250" x2="520" y2="250" stroke="#999" stroke-width="1" stroke-dasharray="4"/>
  <text x="310" y="268" text-anchor="middle" font-size="9" fill="#999">14 个月，同款错误犯两次</text>
</svg>
