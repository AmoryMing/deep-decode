<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <rect width="800" height="520" fill="#FFFFFF"/>
  <text x="400" y="40" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="20" font-weight="bold" fill="#37352F">Claude Code 六层自研架构</text>
  <text x="400" y="62" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#787774">512,000 行 TypeScript / 核心链路零外部依赖</text>

  <!-- L6 Terminal UI -->
  <rect x="80" y="90" width="640" height="55" rx="8" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1.5"/>
  <text x="100" y="115" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="bold" fill="#37352F">L6 终端 UI</text>
  <text x="100" y="133" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">Ink (React for CLI) / 80+ 组件 / Vim 模态编辑 / 187 spinner 动词</text>
  <rect x="620" y="98" width="85" height="24" rx="4" fill="#4DB6AC" opacity="0.15"/>
  <text x="662" y="115" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#4DB6AC">体验层</text>

  <!-- L5 Memory -->
  <rect x="80" y="155" width="640" height="55" rx="8" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1.5"/>
  <text x="100" y="180" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="bold" fill="#37352F">L5 记忆层</text>
  <text x="100" y="198" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">4 类记忆 (user/feedback/project/reference) / 三级压缩 / 92% 缓存复用</text>
  <rect x="620" y="163" width="85" height="24" rx="4" fill="#2383E2" opacity="0.15"/>
  <text x="662" y="180" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#2383E2">状态层</text>

  <!-- L4 Security -->
  <rect x="80" y="220" width="640" height="55" rx="8" fill="#FFF5F5" stroke="#EB5757" stroke-width="1.5"/>
  <text x="100" y="245" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="bold" fill="#37352F">L4 安全层</text>
  <text x="100" y="263" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">双 AI 制衡 / 四层权限管道 / 6 级信任阶梯 / 22+ 危险操作拦截</text>
  <rect x="620" y="228" width="85" height="24" rx="4" fill="#EB5757" opacity="0.15"/>
  <text x="662" y="245" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#EB5757">安全层</text>

  <!-- L3 Tools -->
  <rect x="80" y="285" width="640" height="55" rx="8" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1.5"/>
  <text x="100" y="310" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="bold" fill="#37352F">L3 工具层</text>
  <text x="100" y="328" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">45 个一等公民 / 独立 schema + 权限声明 / 默认不信任 / MCP 可扩展</text>
  <rect x="620" y="293" width="85" height="24" rx="4" fill="#9B51E0" opacity="0.15"/>
  <text x="662" y="310" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#9B51E0">能力层</text>

  <!-- L2 Core Engine -->
  <rect x="80" y="350" width="640" height="55" rx="8" fill="#EBF5FF" stroke="#2383E2" stroke-width="1.5"/>
  <text x="100" y="375" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="bold" fill="#37352F">L2 核心引擎</text>
  <text x="100" y="393" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">QueryEngine 13,000 行 / 单线程 Agent Loop / Prompt 装配层 / Token 追踪</text>
  <rect x="620" y="358" width="85" height="24" rx="4" fill="#2383E2" opacity="0.15"/>
  <text x="662" y="375" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#2383E2">大脑</text>

  <!-- L1 Runtime -->
  <rect x="80" y="415" width="640" height="55" rx="8" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1.5"/>
  <text x="100" y="440" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="bold" fill="#37352F">L1 运行时</text>
  <text x="100" y="458" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">Bun (Anthropic 收购) / 并行预取启动优化 / 按 Runtime 设计而非一次性 CLI</text>
  <rect x="620" y="423" width="85" height="24" rx="4" fill="#787774" opacity="0.15"/>
  <text x="662" y="440" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">基础</text>

  <!-- Bottom insight -->
  <text x="400" y="500" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F">不用 LangChain / 不用 AutoGen / 不用 Semantic Kernel -- 全栈自研换来每一层的完全控制</text>
</svg>