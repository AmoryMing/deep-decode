<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#FFFFFF"/>

  <text x="400" y="38" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="22" font-weight="bold" fill="#37352F">「信任传递悖论」</text>
  <text x="400" y="62" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#787774">你越信任工具，它帮你犯错的概率越高</text>

  <!-- 左侧：信任阶梯 6级 -->
  <text x="120" y="100" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="bold" fill="#4DB6AC">信任等级</text>

  <!-- 阶梯 -->
  <rect x="40" y="340" width="160" height="30" rx="4" fill="#4DB6AC" opacity="0.1" stroke="#4DB6AC" stroke-width="1"/>
  <text x="120" y="360" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#4DB6AC">L1 default 每步确认</text>

  <rect x="55" y="300" width="160" height="30" rx="4" fill="#4DB6AC" opacity="0.2" stroke="#4DB6AC" stroke-width="1"/>
  <text x="135" y="320" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#4DB6AC">L2 approve-once</text>

  <rect x="70" y="260" width="160" height="30" rx="4" fill="#4DB6AC" opacity="0.3" stroke="#4DB6AC" stroke-width="1"/>
  <text x="150" y="280" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#4DB6AC">L3 trusted-tools</text>

  <rect x="85" y="220" width="160" height="30" rx="4" fill="#4DB6AC" opacity="0.4" stroke="#4DB6AC" stroke-width="1"/>
  <text x="165" y="240" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#4DB6AC">L4 yolo-mode</text>

  <rect x="100" y="180" width="160" height="30" rx="4" fill="#4DB6AC" opacity="0.6" stroke="#4DB6AC" stroke-width="1"/>
  <text x="180" y="200" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#FFFFFF">L5 bypass</text>

  <rect x="115" y="140" width="160" height="30" rx="4" fill="#4DB6AC" opacity="0.8" stroke="#4DB6AC" stroke-width="1"/>
  <text x="195" y="160" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#FFFFFF">L6 auto 全自动</text>

  <!-- 右侧：风险同步上升 -->
  <text x="560" y="100" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="bold" fill="#EB5757">同步上升的风险</text>

  <!-- 风险条 -->
  <rect x="440" y="345" width="40" height="20" rx="3" fill="#EB5757" opacity="0.15"/>
  <text x="500" y="360" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774">密钥泄露 1.5%</text>

  <rect x="440" y="305" width="70" height="20" rx="3" fill="#EB5757" opacity="0.25"/>
  <text x="530" y="320" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774">误操作风险</text>

  <rect x="440" y="265" width="100" height="20" rx="3" fill="#EB5757" opacity="0.35"/>
  <text x="560" y="280" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774">破坏性命令</text>

  <rect x="440" y="225" width="140" height="20" rx="3" fill="#EB5757" opacity="0.45"/>
  <text x="600" y="240" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#EB5757">自动提交含密钥代码</text>

  <rect x="440" y="185" width="200" height="20" rx="3" fill="#EB5757" opacity="0.6"/>
  <text x="660" y="200" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#EB5757">不可逆操作无人审核</text>

  <rect x="440" y="145" width="280" height="20" rx="3" fill="#EB5757" opacity="0.8"/>
  <text x="740" y="160" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="end">密钥泄露率 3.2%</text>

  <!-- 中间连线 -->
  <line x1="300" y1="155" x2="440" y2="155" stroke="#787774" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
  <line x1="280" y1="195" x2="440" y2="195" stroke="#787774" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
  <line x1="260" y1="235" x2="440" y2="235" stroke="#787774" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
  <line x1="240" y1="275" x2="440" y2="275" stroke="#787774" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
  <line x1="220" y1="315" x2="440" y2="315" stroke="#787774" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
  <line x1="200" y1="355" x2="440" y2="355" stroke="#787774" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>

  <!-- Bottom insight -->
  <rect x="100" y="400" width="600" height="55" rx="8" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="400" y="422" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#37352F">Claude Code 用四道门（bashClassifier + yoloClassifier + 权限网关 + 熔断）对抗这个悖论</text>
  <text x="400" y="444" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="bold" fill="#EB5757">但 GitGuardian 数据表明：密钥泄露率仍是行业的 2 倍</text>
</svg>
