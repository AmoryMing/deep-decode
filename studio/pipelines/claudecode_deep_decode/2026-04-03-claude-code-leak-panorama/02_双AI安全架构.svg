<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <style>text { font-family: PingFang SC, Inter, sans-serif; }</style>
    <marker id="ar1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#EB5757"/>
    </marker>
  </defs>

  <rect width="800" height="420" fill="#FFFFFF"/>
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#37352F">Auto 模式双 AI 安全架构</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#999">主 AI 执行任务 / 独立 Sonnet(T=0) 做安全决策 / 熔断机制</text>

  <!-- Main AI -->
  <rect x="80" y="80" width="260" height="250" rx="12" fill="#E8F4FD" stroke="#2383E2" stroke-width="2"/>
  <rect x="80" y="80" width="260" height="35" rx="12" fill="#2383E2"/>
  <rect x="80" y="100" width="260" height="15" fill="#2383E2"/>
  <text x="210" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFF">主 AI (Opus)</text>
  <text x="100" y="140" font-size="11" fill="#37352F">执行用户任务</text>
  <text x="100" y="160" font-size="11" fill="#37352F">调用 45+ 工具</text>
  <text x="100" y="180" font-size="11" fill="#37352F">管理对话状态</text>
  <text x="100" y="210" font-size="11" fill="#37352F">三级上下文压缩</text>
  <text x="100" y="230" font-size="11" fill="#37352F">推测执行预判</text>
  <text x="100" y="270" font-size="11" fill="#2383E2" font-weight="bold">工具调用请求 →</text>

  <!-- Arrow -->
  <path d="M 350 270 L 430 270" stroke="#EB5757" stroke-width="3" marker-end="url(#ar1)"/>

  <!-- Safety Classifier -->
  <rect x="440" y="80" width="280" height="250" rx="12" fill="#FFEBEE" stroke="#EB5757" stroke-width="2"/>
  <rect x="440" y="80" width="280" height="35" rx="12" fill="#EB5757"/>
  <rect x="440" y="100" width="280" height="15" fill="#EB5757"/>
  <text x="580" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFF">权限分类器 (Sonnet, T=0)</text>

  <rect x="460" y="135" width="240" height="32" rx="6" fill="#FFF" stroke="#ddd"/>
  <text x="580" y="156" text-anchor="middle" font-size="10" fill="#37352F">1. 历史规则命中? → 放行</text>

  <rect x="460" y="175" width="240" height="32" rx="6" fill="#FFF" stroke="#ddd"/>
  <text x="580" y="196" text-anchor="middle" font-size="10" fill="#37352F">2. 低风险操作? → 跳过</text>

  <rect x="460" y="215" width="240" height="32" rx="6" fill="#FFF" stroke="#ddd"/>
  <text x="580" y="236" text-anchor="middle" font-size="10" fill="#37352F">3. 只读白名单? → 直通</text>

  <rect x="460" y="255" width="240" height="50" rx="6" fill="#FFEBEE" stroke="#EB5757"/>
  <text x="580" y="275" text-anchor="middle" font-size="10" fill="#EB5757" font-weight="bold">4. AI 三档判定</text>
  <text x="580" y="293" text-anchor="middle" font-size="9" fill="#EB5757">Allow / Soft Deny / Hard Deny</text>

  <!-- Circuit Breaker -->
  <rect x="80" y="365" width="640" height="40" rx="6" fill="#FFF8E1" stroke="#FFB020"/>
  <text x="400" y="382" text-anchor="middle" font-size="11" font-weight="bold" fill="#E6930A">BashTool: 23 项安全检查</text>
  <text x="400" y="398" text-anchor="middle" font-size="10" fill="#E6930A">bashClassifier(正则) + yoloClassifier(LLM两阶段XML) | 熔断: 3次连续/20次累计 → 降级手动</text>
</svg>
