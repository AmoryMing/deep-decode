<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1131" width="800" height="1131">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1131" fill="url(#bg)"/>

  <!-- 装饰线条 -->
  <line x1="80" y1="200" x2="720" y2="200" stroke="#2383E2" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="760" x2="720" y2="760" stroke="#2383E2" stroke-width="1" opacity="0.3"/>

  <!-- 系列标签 -->
  <rect x="80" y="160" width="200" height="28" rx="4" fill="#2383E2" opacity="0.9"/>
