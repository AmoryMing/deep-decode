  <text x="400" y="380" font-family="PingFang SC, Inter, sans-serif" font-size="48" fill="#FFFFFF" text-anchor="middle" font-weight="700">1902个文件里</text>
  <text x="400" y="450" font-family="PingFang SC, Inter, sans-serif" font-size="48" fill="#FFFFFF" text-anchor="middle" font-weight="700">藏了什么</text>

