  <text x="400" y="520" font-family="PingFang SC, Inter, sans-serif" font-size="22" fill="#9CA3AF" text-anchor="middle">Claude Code 源码泄露全景</text>

  <!-- 核心数据 -->
  <g transform="translate(120, 580)">
    <rect width="160" height="80" rx="8" fill="#1E293B" stroke="#2383E2" stroke-width="1" opacity="0.8"/>
    <text x="80" y="35" font-family="Inter, PingFang SC, sans-serif" font-size="28" fill="#2383E2" text-anchor="middle" font-weight="700">59.8 MB</text>
    <text x="80" y="58" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">Source Map</text>
  </g>
  <g transform="translate(320, 580)">
    <rect width="160" height="80" rx="8" fill="#1E293B" stroke="#EB5757" stroke-width="1" opacity="0.8"/>
    <text x="80" y="35" font-family="Inter, PingFang SC, sans-serif" font-size="28" fill="#EB5757" text-anchor="middle" font-weight="700">512K</text>
    <text x="80" y="58" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">行 TypeScript</text>
  </g>
  <g transform="translate(520, 580)">
    <rect width="160" height="80" rx="8" fill="#1E293B" stroke="#4DB6AC" stroke-width="1" opacity="0.8"/>
    <text x="80" y="35" font-family="Inter, PingFang SC, sans-serif" font-size="28" fill="#4DB6AC" text-anchor="middle" font-weight="700">1,902</text>
    <text x="80" y="58" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">个源码文件</text>
  </g>

  <!-- 关键词标签 -->
  <g transform="translate(130, 710)">
    <rect width="100" height="26" rx="13" fill="none" stroke="#4DB6AC" stroke-width="1" opacity="0.6"/>
    <text x="50" y="17" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#4DB6AC" text-anchor="middle">六层架构</text>
  </g>
  <g transform="translate(250, 710)">
