<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs><style>text { font-family: PingFang SC, Inter, sans-serif; }</style></defs>
  <rect width="800" height="420" fill="#FFFFFF"/>

  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#37352F">遥测三通道 + cch 反作弊</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#999">DISABLE_TELEMETRY=1 只关两路，API 请求自带 attestation</text>

  <!-- Datadog -->
  <rect x="40" y="80" width="220" height="180" rx="10" fill="#FFF" stroke="#7C4DFF" stroke-width="2"/>
  <rect x="40" y="80" width="220" height="30" rx="10" fill="#7C4DFF"/>
  <rect x="40" y="100" width="220" height="10" fill="#7C4DFF"/>
  <text x="150" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF">Datadog</text>
  <text x="60" y="130" font-size="11" fill="#37352F">实时事件监控</text>
  <text x="60" y="150" font-size="11" fill="#37352F">80+ 事件类型</text>
  <text x="60" y="180" font-size="10" fill="#4DB6AC">✓ 禁用可关</text>

  <!-- BigQuery -->
  <rect x="290" y="80" width="220" height="180" rx="10" fill="#FFF" stroke="#2383E2" stroke-width="2"/>
  <rect x="290" y="80" width="220" height="30" rx="10" fill="#2383E2"/>
  <rect x="290" y="100" width="220" height="10" fill="#2383E2"/>
  <text x="400" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF">1P BigQuery</text>
  <text x="310" y="130" font-size="11" fill="#37352F">完整遥测日志</text>
  <text x="310" y="150" font-size="11" fill="#37352F">OAuth 认证</text>
  <text x="310" y="180" font-size="10" fill="#4DB6AC">✓ 禁用可关</text>

  <!-- GrowthBook -->
  <rect x="540" y="80" width="220" height="180" rx="10" fill="#FFF" stroke="#FFB020" stroke-width="2"/>
  <rect x="540" y="80" width="220" height="30" rx="10" fill="#FFB020"/>
  <rect x="540" y="100" width="220" height="10" fill="#FFB020"/>
  <text x="650" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF">GrowthBook</text>
  <text x="560" y="130" font-size="11" fill="#37352F">A/B 实验 + 特性开关</text>
  <text x="560" y="150" font-size="11" fill="#37352F">15 维用户画像</text>
  <text x="560" y="180" font-size="10" fill="#EB5757">✗ 无法关闭</text>
  <text x="560" y="200" font-size="10" fill="#666">设备 ID 跨账号持久</text>
  <text x="560" y="220" font-size="10" fill="#666">关联封号 → 连带封禁</text>

  <!-- Billing header -->
  <rect x="80" y="300" width="640" height="100" rx="8" fill="#FFEBEE" stroke="#EB5757" stroke-width="2"/>
  <text x="400" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="#EB5757">每个 API 请求自动携带</text>
  <text x="400" y="348" text-anchor="middle" font-size="10" fill="#37352F" font-family="monospace">x-anthropic-billing-header: cc_version={ver}.{fp}; cch={hash};</text>
  <text x="400" y="375" text-anchor="middle" font-size="11" fill="#EB5757">cch = Bun/Zig 底层计算 → 修改过的客户端无法伪造</text>
  <text x="400" y="393" text-anchor="middle" font-size="10" fill="#999">发现者: Chaofan Shou (@Fried_rice), Solayer Labs 安全研究员</text>
</svg>
