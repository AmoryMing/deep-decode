<svg xmlns="http://www.w3.org/2000/svg" width="800" height="620" viewBox="0 0 800 620" font-family="PingFang SC, Inter, -apple-system, sans-serif">
  <rect width="800" height="620" fill="#FFFFFF"/>

  <text x="400" y="40" font-size="22" font-weight="700" fill="#37352F" text-anchor="middle">Context 三位一体：Letta 的 selfhood 哲学骨骼</text>
  <text x="400" y="66" font-size="13" fill="#6B6864" text-anchor="middle">Identity / Memory / Continuity 三者循环，缺一不成立</text>

  <!-- 三角形布局 -->
  <!-- Identity top -->
  <circle cx="400" cy="190" r="80" fill="#F7F7F5" stroke="#2383E2" stroke-width="2.5"/>
  <text x="400" y="180" font-size="18" font-weight="700" fill="#2383E2" text-anchor="middle">Identity</text>
  <text x="400" y="205" font-size="13" fill="#37352F" text-anchor="middle">身份</text>
  <text x="400" y="225" font-size="10" fill="#6B6864" text-anchor="middle">grounded stability</text>
  <text x="400" y="240" font-size="10" fill="#6B6864" text-anchor="middle">evolves over time</text>

  <!-- Memory bottom left -->
  <circle cx="230" cy="450" r="80" fill="#F7F7F5" stroke="#4DB6AC" stroke-width="2.5"/>
  <text x="230" y="440" font-size="18" font-weight="700" fill="#4DB6AC" text-anchor="middle">Memory</text>
  <text x="230" y="465" font-size="13" fill="#37352F" text-anchor="middle">记忆</text>
  <text x="230" y="485" font-size="10" fill="#6B6864" text-anchor="middle">generalization</text>
  <text x="230" y="500" font-size="10" fill="#6B6864" text-anchor="middle">（泛化，不是流水账）</text>

  <!-- Continuity bottom right -->
  <circle cx="570" cy="450" r="80" fill="#F7F7F5" stroke="#FFB020" stroke-width="2.5"/>
  <text x="570" y="440" font-size="18" font-weight="700" fill="#FFB020" text-anchor="middle">Continuity</text>
  <text x="570" y="465" font-size="13" fill="#37352F" text-anchor="middle">连续性</text>
  <text x="570" y="485" font-size="10" fill="#6B6864" text-anchor="middle">past + future</text>
  <text x="570" y="500" font-size="10" fill="#6B6864" text-anchor="middle">= same self</text>

  <!-- 箭头：循环 -->
  <defs>
    <marker id="arrA" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#6B6864"/>
    </marker>
  </defs>

  <!-- Identity → Memory -->
  <path d="M 340 250 Q 270 340 260 370" stroke="#6B6864" stroke-width="1.8" fill="none" marker-end="url(#arrA)"/>
  <text x="280" y="320" font-size="11" fill="#6B6864">指导记什么</text>

  <!-- Memory → Continuity -->
  <path d="M 320 460 L 490 460" stroke="#6B6864" stroke-width="1.8" fill="none" marker-end="url(#arrA)"/>
  <text x="400" y="450" font-size="11" fill="#6B6864" text-anchor="middle">积累成延续</text>

  <!-- Continuity → Identity -->
  <path d="M 540 370 Q 530 340 460 250" stroke="#6B6864" stroke-width="1.8" fill="none" marker-end="url(#arrA)"/>
  <text x="530" y="320" font-size="11" fill="#6B6864">巩固身份</text>

  <!-- 底部注解 -->
  <rect x="120" y="560" width="560" height="42" fill="#F7F7F5" stroke="#E4E2DF" rx="4"/>
  <text x="400" y="580" font-size="12" fill="#37352F" text-anchor="middle">关键原话："A Letta agent should prefer the identity formed by its experiences, over that of the underlying model."</text>
  <text x="400" y="596" font-size="11" fill="#6B6864" text-anchor="middle">— Context as Identity 章节</text>
</svg>