<svg xmlns="http://www.w3.org/2000/svg" width="800" height="580" viewBox="0 0 800 580" font-family="PingFang SC, Inter, -apple-system, sans-serif">
  <rect width="800" height="580" fill="#FFFFFF"/>

  <text x="400" y="40" font-size="22" font-weight="700" fill="#37352F" text-anchor="middle">Letta 产品矩阵：Constitution 是最后一块拼图</text>
  <text x="400" y="66" font-size="13" fill="#6B6864" text-anchor="middle">三年攒出来的 experiential AI 工厂</text>

  <!-- Layer 4 顶层：Context Constitution -->
  <rect x="200" y="110" width="400" height="70" fill="#2383E2" rx="6"/>
  <text x="400" y="140" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">治理哲学层</text>
  <text x="400" y="162" font-size="14" fill="#FFFFFF" text-anchor="middle">Context Constitution（2026-04-02）</text>
  <text x="615" y="148" font-size="11" fill="#2383E2">NEW</text>

  <!-- Layer 3 应用 -->
  <rect x="120" y="210" width="560" height="80" fill="#F7F7F5" stroke="#2383E2" stroke-width="1.5" rx="6"/>
  <text x="400" y="232" font-size="14" font-weight="700" fill="#37352F" text-anchor="middle">应用/Harness 层（2025-2026）</text>
  <g font-size="11" fill="#6B6864">
    <text x="170" y="258" font-weight="600" fill="#37352F">Letta Code</text>
    <text x="170" y="274">memory-first harness</text>
    <text x="310" y="258" font-weight="600" fill="#37352F">Context Repositories</text>
    <text x="310" y="274">git-backed memory</text>
    <text x="470" y="258" font-weight="600" fill="#37352F">Skill Learning</text>
    <text x="470" y="274">通过经验学技能</text>
    <text x="590" y="258" font-weight="600" fill="#37352F">memory omni-tool</text>
    <text x="590" y="274">Sonnet 4.5 集成</text>
  </g>

  <!-- Layer 2 基础设施 -->
  <rect x="80" y="320" width="640" height="80" fill="#F7F7F5" stroke="#4DB6AC" stroke-width="1.5" rx="6"/>
  <text x="400" y="342" font-size="14" font-weight="700" fill="#37352F" text-anchor="middle">基础设施层（2024-2025）</text>
  <g font-size="11" fill="#6B6864">
    <text x="160" y="368" font-weight="600" fill="#37352F">Letta API</text>
    <text x="160" y="384">stateful agent infra</text>
    <text x="310" y="368" font-weight="600" fill="#37352F">Agent File (.af)</text>
    <text x="310" y="384">开放序列化格式</text>
    <text x="455" y="368" font-weight="600" fill="#37352F">Letta ADE</text>
    <text x="455" y="384">Agent 开发环境</text>
    <text x="580" y="368" font-weight="600" fill="#37352F">Memory Blocks</text>
    <text x="580" y="384">结构化 context</text>
  </g>

  <!-- Layer 1 理论根基 -->
  <rect x="60" y="430" width="680" height="70" fill="#F7F7F5" stroke="#9B51E0" stroke-width="1.5" rx="6"/>
  <text x="400" y="452" font-size="14" font-weight="700" fill="#37352F" text-anchor="middle">理论根基（2023）</text>
  <text x="400" y="476" font-size="12" fill="#37352F" text-anchor="middle" font-style="italic">MemGPT: Towards LLMs as Operating Systems</text>
  <text x="400" y="492" font-size="11" fill="#6B6864" text-anchor="middle">Charles Packer + Sarah Wooders 等人 · arXiv 2310.08560 · 提出 virtual context management</text>

  <!-- 底注 -->
  <text x="400" y="540" font-size="11" fill="#6B6864" text-anchor="middle">Constitution 发布前的两年半，Letta 在造零件；Constitution 发布后，零件才组成治理闭环。</text>
  <text x="400" y="556" font-size="11" fill="#6B6864" text-anchor="middle">配合同期 Context-Bench / Recovery-Bench / Letta Filesystem（LoCoMo 74.0%）评测体系，形成完整生态。</text>
</svg>