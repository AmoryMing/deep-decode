<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" font-family="PingFang SC, Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#FAFAF7"/>
      <stop offset="1" stop-color="#F2EEE4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="72" text-anchor="middle" font-size="32" font-weight="800" fill="#1F1A14">Claude Opus 4.7</text>
  <text x="400" y="110" text-anchor="middle" font-size="18" fill="#6B6052">不是顶配 —— 顶配被 Anthropic 锁起来了</text>

  <!-- Two-tier illustration -->
  <!-- Mythos locked -->
  <g transform="translate(130, 180)">
    <rect x="0" y="0" width="220" height="240" rx="16" fill="#1F1A14" filter="url(#shadow)"/>
    <text x="110" y="44" text-anchor="middle" font-size="14" fill="#FFB020" font-weight="700">TIER 1 · 联盟限制</text>
    <text x="110" y="82" text-anchor="middle" font-size="22" fill="#FFFFFF" font-weight="800">Mythos Preview</text>
    <!-- lock icon -->
    <g transform="translate(88, 104)" stroke="#FFB020" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="6" y="18" width="32" height="26" rx="3" fill="#FFB020" stroke="none"/>
      <path d="M12 18 V12 a10 10 0 0 1 20 0 V18"/>
    </g>
    <text x="110" y="182" text-anchor="middle" font-size="14" fill="#D4C9B5">SWE-bench Verified</text>
    <text x="110" y="210" text-anchor="middle" font-size="30" fill="#FFFFFF" font-weight="800">93.9%</text>
  </g>

  <!-- Opus 4.7 public -->
  <g transform="translate(450, 180)">
    <rect x="0" y="0" width="220" height="240" rx="16" fill="#FFFFFF" stroke="#2383E2" stroke-width="2" filter="url(#shadow)"/>
    <text x="110" y="44" text-anchor="middle" font-size="14" fill="#2383E2" font-weight="700">TIER 2 · 公开发布</text>
    <text x="110" y="82" text-anchor="middle" font-size="22" fill="#1F1A14" font-weight="800">Opus 4.7</text>
    <!-- open door icon -->
    <g transform="translate(94, 104)" stroke="#2383E2" stroke-width="2.5" fill="none" stroke-linecap="round">
      <path d="M6 44 V10 L32 4 V50 Z" fill="#E8F1FC"/>
      <circle cx="26" cy="28" r="2" fill="#2383E2"/>
    </g>
    <text x="110" y="182" text-anchor="middle" font-size="14" fill="#6B6052">SWE-bench Verified</text>
    <text x="110" y="210" text-anchor="middle" font-size="30" fill="#1F1A14" font-weight="800">87.6%</text>
  </g>

  <!-- Arrow connecting -->
  <g stroke="#9B8B72" stroke-width="2" fill="none" stroke-dasharray="5,4">
    <path d="M360 300 L440 300"/>
  </g>
  <text x="400" y="292" text-anchor="middle" font-size="11" fill="#9B8B72">差异化训练降能</text>

  <!-- Footer -->
  <text x="400" y="460" text-anchor="middle" font-size="12" fill="#9B8B72">Apr 16, 2026 · Anthropic 深度解读</text>
</svg>
