<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" font-family="PingFang SC, Inter, sans-serif">
  <rect width="800" height="500" fill="#FFFFFF"/>

  <text x="400" y="42" text-anchor="middle" font-size="22" font-weight="800" fill="#37352F">差异化训练: 一台能力手术刀</text>
  <text x="400" y="66" text-anchor="middle" font-size="13" fill="#787066">同一底座 · 训练阶段精准削除特定能力 · 副作用已显现</text>

  <!-- Left: Mythos base capabilities -->
  <g transform="translate(80, 120)">
    <text x="110" y="-10" text-anchor="middle" font-size="14" font-weight="700" fill="#1F1A14">Mythos Preview (原始)</text>
    <rect x="0" y="0" width="220" height="300" rx="10" fill="#1F1A14"/>

    <g font-size="12" fill="#FFFFFF">
      <rect x="14" y="16" width="192" height="36" rx="4" fill="#2A2419"/>
      <text x="26" y="38">编码能力</text>
      <rect x="154" y="28" width="42" height="10" rx="2" fill="#7DDAA8"/>

      <rect x="14" y="60" width="192" height="36" rx="4" fill="#2A2419"/>
      <text x="26" y="82">推理能力</text>
      <rect x="154" y="72" width="42" height="10" rx="2" fill="#7DDAA8"/>

      <rect x="14" y="104" width="192" height="36" rx="4" fill="#2A2419"/>
      <text x="26" y="126">视觉理解</text>
      <rect x="154" y="116" width="42" height="10" rx="2" fill="#7DDAA8"/>

      <rect x="14" y="148" width="192" height="36" rx="4" fill="#4A2A1F"/>
      <text x="26" y="170" fill="#FFB020">攻击性网络能力</text>
      <rect x="154" y="160" width="42" height="10" rx="2" fill="#FFB020"/>

      <rect x="14" y="192" width="192" height="36" rx="4" fill="#2A2419"/>
      <text x="26" y="214">管制物质建议</text>
      <rect x="154" y="204" width="42" height="10" rx="2" fill="#7DDAA8"/>

      <rect x="14" y="236" width="192" height="48" rx="4" fill="#2A2419"/>
      <text x="26" y="258">其它通用能力</text>
      <rect x="154" y="250" width="42" height="10" rx="2" fill="#7DDAA8"/>
    </g>
  </g>

  <!-- Arrow -->
  <g transform="translate(320, 255)">
    <path d="M0 0 L140 0" stroke="#EB5757" stroke-width="2" fill="none"/>
    <path d="M135 -6 L147 0 L135 6 Z" fill="#EB5757"/>
    <text x="70" y="-18" text-anchor="middle" font-size="12" font-weight="700" fill="#EB5757">差异化训练</text>
    <text x="70" y="20" text-anchor="middle" font-size="10" fill="#9B8B72">Differential Training</text>
  </g>

  <!-- Right: Opus 4.7 after -->
  <g transform="translate(480, 120)">
    <text x="110" y="-10" text-anchor="middle" font-size="14" font-weight="700" fill="#2383E2">Opus 4.7 (发布版)</text>
    <rect x="0" y="0" width="220" height="300" rx="10" fill="#E8F1FC" stroke="#2383E2"/>

    <g font-size="12" fill="#37352F">
      <rect x="14" y="16" width="192" height="36" rx="4" fill="#FFFFFF"/>
      <text x="26" y="38">编码能力</text>
      <rect x="154" y="28" width="42" height="10" rx="2" fill="#4DB6AC"/>

      <rect x="14" y="60" width="192" height="36" rx="4" fill="#FFFFFF"/>
      <text x="26" y="82">推理能力</text>
      <rect x="154" y="72" width="42" height="10" rx="2" fill="#4DB6AC"/>

      <rect x="14" y="104" width="192" height="36" rx="4" fill="#FFFFFF"/>
      <text x="26" y="126">视觉理解</text>
      <rect x="154" y="116" width="42" height="10" rx="2" fill="#4DB6AC"/>

      <rect x="14" y="148" width="192" height="36" rx="4" fill="#FFE4E4"/>
      <text x="26" y="170" fill="#EB5757">攻击性网络能力 ✂</text>
      <rect x="154" y="160" width="16" height="10" rx="2" fill="#EB5757"/>

      <rect x="14" y="192" width="192" height="36" rx="4" fill="#FFF8E6"/>
      <text x="26" y="214" fill="#B07B1F">管制物质建议 ⚠</text>
      <rect x="154" y="204" width="34" height="10" rx="2" fill="#FFB020"/>

      <rect x="14" y="236" width="192" height="48" rx="4" fill="#FFFFFF"/>
      <text x="26" y="258">其它通用能力</text>
      <rect x="154" y="250" width="42" height="10" rx="2" fill="#4DB6AC"/>
    </g>
  </g>

  <!-- Bottom annotation -->
  <g transform="translate(80, 440)">
    <rect width="640" height="36" rx="6" fill="#FFF8E6" stroke="#FFB020"/>
    <text x="320" y="16" text-anchor="middle" font-size="11" fill="#6B5B2E" font-weight="600">副作用: 精度未臻完美 —— 减害建议比 Opus 4.6 "稍差一点"</text>
    <text x="320" y="30" text-anchor="middle" font-size="10" fill="#6B5B2E">能力之间耦合，一刀下去会波及邻近肌肉</text>
  </g>
</svg>
