<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="540" viewBox="0 0 800 540">
  <rect width="800" height="540" fill="#FFFFFF"/>

  <text x="400" y="44" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="22" font-weight="700" fill="#37352F">历史三镜：每一轮技术革命都是 "前人栽树，后人乘凉"</text>
  <text x="400" y="70" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#787774">泡沫期的大多数玩家都会倒下，基础设施沉淀之后，巨头才真正登场</text>

  <!-- 三栏容器 -->
  <!-- 第一栏：1840 铁路 -->
  <g>
    <rect x="40" y="100" width="230" height="380" rx="8" fill="#F7F7F5" stroke="#E3E2E0"/>
    <rect x="40" y="100" width="230" height="44" rx="8" fill="#EB5757"/>
    <text x="155" y="130" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">1840 英国铁路狂热</text>

    <text x="60" y="175" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" font-weight="600">泡沫期</text>
    <text x="60" y="198" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">上千家铁路公司注册</text>
    <text x="60" y="216" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">家庭主妇也买股票</text>

    <text x="60" y="250" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" font-weight="600">破裂期</text>
    <text x="60" y="273" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#EB5757">大部分公司破产</text>
    <text x="60" y="291" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">投资人血本无归</text>

    <text x="60" y="325" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" font-weight="600">沉淀期</text>
    <text x="60" y="348" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#4DB6AC">基础设施铺好</text>
    <text x="60" y="366" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">做生意成本够低</text>

    <rect x="55" y="395" width="200" height="70" rx="6" fill="#FFFFFF" stroke="#E3E2E0"/>
    <text x="155" y="418" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">真正的铁路巨头</text>
    <text x="155" y="438" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="700" fill="#37352F">之后诞生</text>
    <text x="155" y="456" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">30 年周期</text>
  </g>

  <!-- 第二栏：2000 互联网 -->
  <g>
    <rect x="285" y="100" width="230" height="380" rx="8" fill="#F7F7F5" stroke="#E3E2E0"/>
    <rect x="285" y="100" width="230" height="44" rx="8" fill="#FFB020"/>
    <text x="400" y="130" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">2000 互联网泡沫</text>

    <text x="305" y="175" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" font-weight="600">泡沫期</text>
    <text x="305" y="198" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">带 .com 就能融资</text>
    <text x="305" y="216" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">Nasdaq 冲 5048 点</text>

    <text x="305" y="250" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" font-weight="600">破裂期</text>
    <text x="305" y="273" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#EB5757">Nasdaq 跌 78%</text>
    <text x="305" y="291" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">无数公司烧完钱死</text>

    <text x="305" y="325" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" font-weight="600">沉淀期</text>
    <text x="305" y="348" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#4DB6AC">带宽 / 域名 / 浏览器</text>
    <text x="305" y="366" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">第一代网民沉淀</text>

    <rect x="300" y="395" width="200" height="70" rx="6" fill="#FFFFFF" stroke="#E3E2E0"/>
    <text x="400" y="418" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">Google / Amazon</text>
    <text x="400" y="438" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="700" fill="#37352F">之后崛起</text>
    <text x="400" y="456" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">10 年周期</text>
  </g>

  <!-- 第三栏：2026 AI -->
  <g>
    <rect x="530" y="100" width="230" height="380" rx="8" fill="#F7F7F5" stroke="#E3E2E0"/>
    <rect x="530" y="100" width="230" height="44" rx="8" fill="#2383E2"/>
    <text x="645" y="130" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">2026 AI（现在进行时）</text>

    <text x="550" y="175" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" font-weight="600">泡沫期（早期）</text>
    <text x="550" y="198" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">Q1 融资 2420 亿美元</text>
    <text x="550" y="216" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">头部 4 家吃 65%</text>

    <text x="550" y="250" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" font-weight="600">信号</text>
    <text x="550" y="273" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#EB5757">95% 企业零回报</text>
    <text x="550" y="291" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">Y Combinator 4000 万美元种子估值</text>

    <text x="550" y="325" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" font-weight="600">差异</text>
    <text x="550" y="348" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#4DB6AC">企业现金流而非杠杆</text>
    <text x="550" y="366" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">OpenAI ARR 240 亿美元</text>

    <rect x="545" y="395" width="200" height="70" rx="6" fill="#FFFFFF" stroke="#E3E2E0"/>
    <text x="645" y="418" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">谁是后人？</text>
    <text x="645" y="438" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="700" fill="#37352F">答案未揭晓</text>
    <text x="645" y="456" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">3–5 年周期？</text>
  </g>

  <!-- 底部金句 -->
  <rect x="40" y="495" width="720" height="36" fill="#F7F7F5" rx="6"/>
  <text x="400" y="518" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" font-style="italic" fill="#37352F">每一轮技术革命都是 "前人栽树，后人乘凉"。你要做那个乘凉的人，不是那个被砍下来的树。</text>
</svg>
