<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="40" font-family="PingFang SC, Inter, sans-serif" font-size="20" font-weight="bold" fill="#37352F" text-anchor="middle">当 "AI 替代" 从圈内判断变成公众常识</text>
  <text x="400" y="62" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#999" text-anchor="middle">对 AI 从业者/实践者的三个信号</text>

  <!-- Signal 1 -->
  <rect x="40" y="90" width="220" height="180" rx="10" fill="#EBF5FF" stroke="#2383E2" stroke-width="1.5"/>
  <text x="150" y="120" font-family="PingFang SC, Inter, sans-serif" font-size="28" font-weight="bold" fill="#2383E2" text-anchor="middle">01</text>
  <text x="150" y="148" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="bold" fill="#37352F" text-anchor="middle">用户预期拉高</text>
  <line x1="80" y1="160" x2="220" y2="160" stroke="#eee" stroke-width="1"/>
  <text x="150" y="182" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#666" text-anchor="middle">"辅助工具"定位</text>
  <text x="150" y="200" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#666" text-anchor="middle">可能不够了</text>
  <text x="150" y="225" font-family="PingFang SC, Inter, sans-serif" font-size="12" font-weight="bold" fill="#2383E2" text-anchor="middle">"自动完成"</text>
  <text x="150" y="245" font-family="PingFang SC, Inter, sans-serif" font-size="12" font-weight="bold" fill="#2383E2" text-anchor="middle">才是期望值</text>

  <!-- Signal 2 -->
  <rect x="290" y="90" width="220" height="180" rx="10" fill="#F0FFF0" stroke="#4DB6AC" stroke-width="1.5"/>
  <text x="400" y="120" font-family="PingFang SC, Inter, sans-serif" font-size="28" font-weight="bold" fill="#4DB6AC" text-anchor="middle">02</text>
  <text x="400" y="148" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="bold" fill="#37352F" text-anchor="middle">"人机协作"叙事</text>
  <line x1="330" y1="160" x2="470" y2="160" stroke="#eee" stroke-width="1"/>
  <text x="400" y="182" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#666" text-anchor="middle">Oracle: "AI tools,</text>
  <text x="400" y="200" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#666" text-anchor="middle">more output"</text>
  <text x="400" y="225" font-family="PingFang SC, Inter, sans-serif" font-size="12" font-weight="bold" fill="#4DB6AC" text-anchor="middle">需要说清楚</text>
  <text x="400" y="245" font-family="PingFang SC, Inter, sans-serif" font-size="12" font-weight="bold" fill="#4DB6AC" text-anchor="middle">协作的边界在哪</text>

  <!-- Signal 3 -->
  <rect x="540" y="90" width="220" height="180" rx="10" fill="#FFF8E1" stroke="#FFB020" stroke-width="1.5"/>
  <text x="650" y="120" font-family="PingFang SC, Inter, sans-serif" font-size="28" font-weight="bold" fill="#FFB020" text-anchor="middle">03</text>
  <text x="650" y="148" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="bold" fill="#37352F" text-anchor="middle">定价锚点在变</text>
  <line x1="580" y1="160" x2="720" y2="160" stroke="#eee" stroke-width="1"/>
  <text x="650" y="182" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#666" text-anchor="middle">竞争对手不是</text>
  <text x="650" y="200" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#666" text-anchor="middle">另一个 AI 产品</text>
  <text x="650" y="225" font-family="PingFang SC, Inter, sans-serif" font-size="12" font-weight="bold" fill="#FFB020" text-anchor="middle">是 "不雇人"</text>
  <text x="650" y="245" font-family="PingFang SC, Inter, sans-serif" font-size="12" font-weight="bold" fill="#FFB020" text-anchor="middle">AI vs 人力成本</text>

  <!-- Bottom insight box -->
  <rect x="40" y="300" width="720" height="65" rx="8" fill="#F7F7F5" stroke="#eee"/>
  <text x="400" y="325" font-family="PingFang SC, Inter, sans-serif" font-size="13" font-weight="bold" fill="#37352F" text-anchor="middle">核心判断</text>
  <text x="400" y="348" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#666" text-anchor="middle">一个 23 岁学生在 TEDx 上讲 "AI 替代就业"能破 11.7 万播放，说明这些判断已经不是前沿观点，而是公众焦虑。</text>

  <!-- Attribution -->
  <text x="400" y="400" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#bbb" text-anchor="middle">AI 笔记 | TEDx 拆解 | 2026-04-13</text>
</svg>
