<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="40" font-family="PingFang SC, Inter, sans-serif" font-size="20" font-weight="bold" fill="#37352F" text-anchor="middle">大脱钩：生产力和劳动力的分手</text>
  <text x="400" y="62" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#999" text-anchor="middle">The Great Decoupling -- 200 年等式第一次被拆开</text>

  <!-- Axis -->
  <line x1="100" y1="400" x2="720" y2="400" stroke="#ddd" stroke-width="1"/>
  <line x1="100" y1="400" x2="100" y2="80" stroke="#ddd" stroke-width="1"/>

  <!-- Time labels -->
  <text x="160" y="425" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#999" text-anchor="middle">1950</text>
  <text x="280" y="425" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#999" text-anchor="middle">1980</text>
  <text x="400" y="425" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#999" text-anchor="middle">2010</text>
  <text x="520" y="425" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#999" text-anchor="middle">2025</text>
  <text x="640" y="425" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#999" text-anchor="middle">2030</text>

  <!-- Coupled phase background -->
  <rect x="100" y="80" width="350" height="320" fill="#F0FFF0" opacity="0.3"/>
  <text x="275" y="100" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#4DB6AC" text-anchor="middle">耦合时代：更高生产力 = 更多就业</text>

  <!-- Decoupled phase background -->
  <rect x="450" y="80" width="270" height="320" fill="#FFF0F0" opacity="0.3"/>
  <text x="585" y="100" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#EB5757" text-anchor="middle">脱钩时代：生产力涨，就业不涨</text>

  <!-- Divider -->
  <line x1="450" y1="80" x2="450" y2="400" stroke="#EB5757" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Productivity curve (keeps going up) -->
  <path d="M160,350 Q220,340 280,310 Q340,280 400,250 Q450,230 520,170 Q580,120 640,90"
        stroke="#2383E2" stroke-width="2.5" fill="none"/>
  <text x="655" y="88" font-family="PingFang SC, Inter, sans-serif" font-size="11" font-weight="bold" fill="#2383E2">生产力</text>

  <!-- Employment curve (plateaus then drops) -->
  <path d="M160,355 Q220,345 280,320 Q340,295 400,270 Q450,265 520,280 Q580,310 640,340"
        stroke="#EB5757" stroke-width="2.5" fill="none"/>
  <text x="655" y="345" font-family="PingFang SC, Inter, sans-serif" font-size="11" font-weight="bold" fill="#EB5757">就业</text>

  <!-- Gap annotation -->
  <line x1="600" y1="105" x2="600" y2="330" stroke="#FFB020" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="612" y="220" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="bold" fill="#FFB020" transform="rotate(90,612,220)">剪刀差</text>

  <!-- Data callouts -->
  <rect x="110" y="440" width="600" height="50" rx="6" fill="#F7F7F5" stroke="#eee"/>
  <text x="130" y="460" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#37352F">Oracle 裁员 30,000 人 | 净利润 +95% | CEO: "Smaller teams. AI tools. More output."</text>
  <text x="130" y="478" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#999">WEF: 2030 年 9,200 万岗位被替代 vs 7,800 万新增 | 净减 1,400 万（~2% 全球劳动力）</text>
</svg>
