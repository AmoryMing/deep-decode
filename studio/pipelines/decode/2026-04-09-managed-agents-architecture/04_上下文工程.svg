<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <rect width="800" height="460" fill="#FFFFFF"/>

  <text x="400" y="38" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="20" font-weight="bold" fill="#37352F">上下文工程：Session 变成外部状态机</text>
  <text x="400" y="58" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#787774">传统压缩 vs Managed Agents 的外部化方案</text>

  <!-- LEFT: Traditional -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="330" height="320" rx="10" fill="#FFF5F5" stroke="#EB5757" stroke-width="1.5"/>
    <text x="165" y="28" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="15" font-weight="bold" fill="#EB5757">传统方案：不可逆压缩</text>

    <!-- Context window box -->
    <rect x="30" y="50" width="270" height="120" rx="8" fill="#FFFFFF" stroke="#E3E2E0" stroke-width="1"/>
    <text x="165" y="72" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">Context Window</text>

    <!-- Layers being compressed -->
    <rect x="45" y="85" width="240" height="22" rx="4" fill="#2383E2" opacity="0.15"/>
    <text x="165" y="100" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#2383E2">早期对话 (被压缩)</text>

    <rect x="45" y="112" width="240" height="22" rx="4" fill="#4DB6AC" opacity="0.2"/>
    <text x="165" y="127" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#3D9E8F">中期工具调用 (被裁剪)</text>

    <rect x="45" y="140" width="240" height="22" rx="4" fill="#FFB020" opacity="0.2"/>
    <text x="165" y="155" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#E6A010">最近对话 (保留)</text>

    <!-- Arrow down to trash -->
    <text x="165" y="195" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="24" fill="#EB5757">-</text>

    <text x="165" y="225" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#EB5757" font-weight="bold">信息永久丢失</text>
    <text x="165" y="248" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">不知道删掉的信息以后会不会用到</text>
    <text x="165" y="270" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">每次压缩都是不可逆决策</text>
    <text x="165" y="292" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">上下文策略固化在 Harness 里</text>
  </g>

  <!-- RIGHT: Managed Agents -->
  <g transform="translate(420, 80)">
    <rect x="0" y="0" width="340" height="320" rx="10" fill="#EBF5FF" stroke="#2383E2" stroke-width="1.5"/>
    <text x="170" y="28" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="15" font-weight="bold" fill="#2383E2">Managed Agents：外部状态机</text>

    <!-- External session log -->
    <rect x="25" y="50" width="290" height="80" rx="8" fill="#FFF8E1" stroke="#FFB020" stroke-width="1.5"/>
    <text x="170" y="72" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" font-weight="bold" fill="#E6A010">Session (External Event Log)</text>
    <text x="170" y="92" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">append-only，完整保留，永不丢失</text>
    <text x="170" y="110" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">getEvents() 按需读取任意切片</text>

    <!-- Four capabilities -->
    <rect x="25" y="148" width="135" height="50" rx="6" fill="#FFFFFF" stroke="#4DB6AC" stroke-width="1"/>
    <text x="92" y="170" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#3D9E8F">位置切片</text>
    <text x="92" y="186" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774">选取任意位置事件</text>

    <rect x="180" y="148" width="135" height="50" rx="6" fill="#FFFFFF" stroke="#4DB6AC" stroke-width="1"/>
    <text x="247" y="170" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#3D9E8F">断点续传</text>
    <text x="247" y="186" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774">从上次停止处继续</text>

    <rect x="25" y="210" width="135" height="50" rx="6" fill="#FFFFFF" stroke="#4DB6AC" stroke-width="1"/>
    <text x="92" y="232" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#3D9E8F">时间回溯</text>
    <text x="92" y="248" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774">查看任意时刻上下文</text>

    <rect x="180" y="210" width="135" height="50" rx="6" fill="#FFFFFF" stroke="#4DB6AC" stroke-width="1"/>
    <text x="247" y="232" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#3D9E8F">策略可换</text>
    <text x="247" y="248" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#787774">未来模型用新策略</text>

    <text x="170" y="290" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#2383E2" font-weight="bold">接口不变，策略随模型演进</text>
    <text x="170" y="310" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">今天 100 万 token，明天 1000 万</text>
  </g>

  <!-- Bottom insight -->
  <rect x="60" y="418" width="680" height="32" rx="6" fill="#F7F7F5"/>
  <text x="400" y="439" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F" font-style="italic">上下文管理不再是一锤子买卖。Session 接口稳定，策略自由演进。</text>
</svg>
