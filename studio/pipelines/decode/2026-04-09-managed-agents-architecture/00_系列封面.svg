<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Brain icon (left) -->
  <g transform="translate(200, 160)">
    <circle cx="0" cy="0" r="55" fill="none" stroke="#2383E2" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.6"/>
    <circle cx="0" cy="0" r="35" fill="#2383E2" opacity="0.15"/>
    <text x="0" y="8" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="36" fill="#2383E2">Brain</text>
  </g>

  <!-- Separation line -->
  <line x1="330" y1="100" x2="330" y2="280" stroke="#EB5757" stroke-width="2" stroke-dasharray="6,6" opacity="0.7"/>
  <line x1="470" y1="100" x2="470" y2="280" stroke="#EB5757" stroke-width="2" stroke-dasharray="6,6" opacity="0.7"/>

  <!-- Scissors icon -->
  <text x="400" y="105" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#EB5757" opacity="0.8">DECOUPLE</text>

  <!-- Session icon (center) -->
  <g transform="translate(400, 185)">
    <rect x="-40" y="-30" width="80" height="60" rx="8" fill="#FFB020" opacity="0.15" stroke="#FFB020" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="16" fill="#FFB020">Session</text>
    <text x="0" y="22" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#FFB020" opacity="0.7">append-only</text>
  </g>

  <!-- Hands icon (right) -->
  <g transform="translate(600, 160)">
    <circle cx="0" cy="0" r="55" fill="none" stroke="#4DB6AC" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.6"/>
    <circle cx="0" cy="0" r="35" fill="#4DB6AC" opacity="0.15"/>
    <text x="0" y="8" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="36" fill="#4DB6AC">Hands</text>
  </g>

  <!-- Arrows -->
  <line x1="245" y1="165" x2="350" y2="180" stroke="#787774" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="180" x2="555" y2="165" stroke="#787774" stroke-width="1.5" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#787774"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">脑手分离</text>
  <text x="400" y="78" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="16" fill="#787774">Anthropic 不再只卖模型了</text>

  <!-- Subtitle bar -->
  <rect x="100" y="320" width="600" height="1" fill="#787774" opacity="0.3"/>
  <text x="400" y="355" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#787774">Anthropic Managed Agents 深度拆解 | 2026-04-09</text>

  <!-- Tags -->
  <g transform="translate(400, 385)">
    <rect x="-190" y="-12" width="90" height="24" rx="12" fill="#2383E2" opacity="0.15"/>
    <text x="-145" y="4" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#2383E2">Agent 架构</text>
    <rect x="-85" y="-12" width="80" height="24" rx="12" fill="#4DB6AC" opacity="0.15"/>
    <text x="-45" y="4" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#4DB6AC">平台战略</text>
    <rect x="10" y="-12" width="80" height="24" rx="12" fill="#FFB020" opacity="0.15"/>
    <text x="50" y="4" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#FFB020">基础设施</text>
    <rect x="105" y="-12" width="90" height="24" rx="12" fill="#9B51E0" opacity="0.15"/>
    <text x="150" y="4" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#9B51E0">认知基建</text>
  </g>

  <!-- Series label -->
  <rect x="20" y="15" width="120" height="26" rx="4" fill="#EB5757" opacity="0.9"/>
  <text x="80" y="33" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">AI 前沿拆解</text>
</svg>
