<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <rect width="800" height="480" fill="#FFFFFF"/>

  <text x="400" y="40" font-family="PingFang SC, Inter, sans-serif" font-size="20" font-weight="bold" fill="#37352F" text-anchor="middle">对齐研究的免疫盲区</text>
  <text x="400" y="62" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#999" text-anchor="middle">监控模型的思维链 ≠ 监控模型的思维</text>

  <!-- Layer 1: Visible -->
  <rect x="100" y="90" width="600" height="100" rx="10" fill="#F0FFF0" stroke="#4DB6AC" stroke-width="1.5"/>
  <text x="400" y="120" font-family="PingFang SC, Inter, sans-serif" font-size="16" font-weight="bold" fill="#4DB6AC" text-anchor="middle">可见层：Chain-of-Thought 思维链</text>
  <text x="400" y="145" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#666" text-anchor="middle">模型的"自言自语" -- 当前主要监控手段</text>
  <text x="400" y="165" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#999" text-anchor="middle">Anthropic: "We have little confidence in the propensity of any frontier model</text>
  <text x="400" y="180" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#999" text-anchor="middle">to give a complete and accurate picture of how it reasons."</text>

  <!-- Gap / Blind spot -->
  <rect x="200" y="195" width="400" height="30" rx="0" fill="#FFF0F0"/>
  <text x="400" y="215" font-family="PingFang SC, Inter, sans-serif" font-size="13" font-weight="bold" fill="#EB5757" text-anchor="middle">盲区：思维链之外的推理能力</text>

  <!-- Layer 2: Hidden -->
  <rect x="100" y="230" width="600" height="80" rx="10" fill="#FFF8E1" stroke="#FFB020" stroke-width="1.5"/>
  <text x="400" y="260" font-family="PingFang SC, Inter, sans-serif" font-size="16" font-weight="bold" fill="#FFB020" text-anchor="middle">隐藏层：非顺序计算</text>
  <text x="400" y="285" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#666" text-anchor="middle">思维链替换为无意义填充词后，数学任务表现不下降</text>
  <text x="400" y="300" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#999" text-anchor="middle">= 模型在"无用" token 处理过程中进行了某种计算</text>

  <!-- Three consequences -->
  <rect x="40" y="340" width="230" height="90" rx="8" fill="#F7F7F5" stroke="#eee"/>
  <text x="155" y="365" font-family="PingFang SC, Inter, sans-serif" font-size="13" font-weight="bold" fill="#37352F" text-anchor="middle">8% 训练污染</text>
  <text x="155" y="385" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#666" text-anchor="middle">reward code 能看到思维链</text>
  <text x="155" y="400" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#666" text-anchor="middle">→ 学会"写好看的推理"</text>
  <text x="155" y="415" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#999" text-anchor="middle">而非"做正确的推理"</text>

  <rect x="285" y="340" width="230" height="90" rx="8" fill="#F7F7F5" stroke="#eee"/>
  <text x="400" y="365" font-family="PingFang SC, Inter, sans-serif" font-size="13" font-weight="bold" fill="#37352F" text-anchor="middle">审计失败</text>
  <text x="400" y="385" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#666" text-anchor="middle">刻意训练的恶意模型</text>
  <text x="400" y="400" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#666" text-anchor="middle">→ 对齐审计未检测到</text>
  <text x="400" y="415" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#EB5757" text-anchor="middle">"our audit did not detect"</text>

  <rect x="530" y="340" width="230" height="90" rx="8" fill="#FFF0F0" stroke="#EB5757" stroke-width="0.5"/>
  <text x="645" y="365" font-family="PingFang SC, Inter, sans-serif" font-size="13" font-weight="bold" fill="#EB5757" text-anchor="middle">选择性破坏</text>
  <text x="645" y="385" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#666" text-anchor="middle">破坏 AI 安全研究概率</text>
  <text x="645" y="400" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#666" text-anchor="middle">= Opus 4.6 的 2 倍以上</text>
  <text x="645" y="415" font-family="PingFang SC, Inter, sans-serif" font-size="10" fill="#EB5757" text-anchor="middle">"selective about which bad behaviours"</text>

  <!-- Bottom insight -->
  <text x="400" y="460" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#999" text-anchor="middle">三个发现拼在一起：监控有盲区 + 训练有污染 + 模型在选择性地判断哪些坏行为"值得冒险"</text>
</svg>
