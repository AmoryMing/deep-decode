<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <rect width="800" height="420" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="22" font-weight="bold" fill="#37352F">Boris 没说的三件事</text>
  <text x="400" y="62" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#9B9A97">15 条 tips 都在说"能做什么"，但避开了这些</text>

  <!-- Blind spot 1: Cost -->
  <rect x="40" y="90" width="220" height="240" rx="10" fill="#FFFFFF" stroke="#EB5757" stroke-width="1.5"/>
  <rect x="40" y="90" width="220" height="6" rx="3" fill="#EB5757"/>

  <text x="150" y="125" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="16" font-weight="bold" fill="#EB5757">成本</text>

  <!-- Money flying away metaphor -->
  <text x="100" y="165" font-family="PingFang SC, Inter, sans-serif" font-size="24" fill="#EB5757" opacity="0.6">$</text>
  <text x="130" y="155" font-family="PingFang SC, Inter, sans-serif" font-size="18" fill="#EB5757" opacity="0.4">$</text>
  <text x="155" y="170" font-family="PingFang SC, Inter, sans-serif" font-size="20" fill="#EB5757" opacity="0.5">$</text>
  <text x="180" y="150" font-family="PingFang SC, Inter, sans-serif" font-size="16" fill="#EB5757" opacity="0.3">$</text>
  <text x="200" y="165" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#EB5757" opacity="0.2">$</text>

  <text x="150" y="210" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F">/batch 启动 1000 个 Agent</text>
  <text x="150" y="230" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F">= 1000 份 token 消耗</text>
  <line x1="70" y1="245" x2="230" y2="245" stroke="#E3E2E0" stroke-width="0.5"/>
  <text x="150" y="268" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">Boris 是 Anthropic 员工</text>
  <text x="150" y="288" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">对成本可能不敏感</text>
  <text x="150" y="315" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" font-weight="bold" fill="#EB5757">个人开发者能承受吗？</text>

  <!-- Blind spot 2: Quality -->
  <rect x="290" y="90" width="220" height="240" rx="10" fill="#FFFFFF" stroke="#FFB020" stroke-width="1.5"/>
  <rect x="290" y="90" width="220" height="6" rx="3" fill="#FFB020"/>

  <text x="400" y="125" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="16" font-weight="bold" fill="#CC8800">质量</text>

  <!-- Noise metaphor: many outputs, some bad -->
  <rect x="320" y="148" width="25" height="18" rx="3" fill="#4DB6AC" opacity="0.2" stroke="#4DB6AC" stroke-width="1"/>
  <rect x="350" y="148" width="25" height="18" rx="3" fill="#4DB6AC" opacity="0.2" stroke="#4DB6AC" stroke-width="1"/>
  <rect x="380" y="148" width="25" height="18" rx="3" fill="#EB5757" opacity="0.3" stroke="#EB5757" stroke-width="1.5"/>
  <rect x="410" y="148" width="25" height="18" rx="3" fill="#4DB6AC" opacity="0.2" stroke="#4DB6AC" stroke-width="1"/>
  <rect x="440" y="148" width="25" height="18" rx="3" fill="#4DB6AC" opacity="0.2" stroke="#4DB6AC" stroke-width="1"/>
  <rect x="320" y="172" width="25" height="18" rx="3" fill="#EB5757" opacity="0.3" stroke="#EB5757" stroke-width="1.5"/>
  <rect x="350" y="172" width="25" height="18" rx="3" fill="#4DB6AC" opacity="0.2" stroke="#4DB6AC" stroke-width="1"/>
  <rect x="380" y="172" width="25" height="18" rx="3" fill="#4DB6AC" opacity="0.2" stroke="#4DB6AC" stroke-width="1"/>
  <rect x="410" y="172" width="25" height="18" rx="3" fill="#4DB6AC" opacity="0.2" stroke="#4DB6AC" stroke-width="1"/>
  <rect x="440" y="172" width="25" height="18" rx="3" fill="#EB5757" opacity="0.3" stroke="#EB5757" stroke-width="1.5"/>

  <text x="400" y="215" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F">/loop 每 5 分钟跑 review</text>
  <text x="400" y="235" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F">质量不稳定怎么办？</text>
  <line x1="320" y1="250" x2="480" y2="250" stroke="#E3E2E0" stroke-width="0.5"/>
  <text x="400" y="273" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">自动化 x 不稳定</text>
  <text x="400" y="293" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">= 批量生产噪音</text>
  <text x="400" y="318" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" font-weight="bold" fill="#CC8800">质量基线怎么保证？</text>

  <!-- Blind spot 3: Learning curve -->
  <rect x="540" y="90" width="220" height="240" rx="10" fill="#FFFFFF" stroke="#9B59B6" stroke-width="1.5"/>
  <rect x="540" y="90" width="220" height="6" rx="3" fill="#9B59B6"/>

  <text x="650" y="125" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="16" font-weight="bold" fill="#9B59B6">门槛</text>

  <!-- Staircase getting steeper -->
  <line x1="580" y1="250" x2="620" y2="250" stroke="#9B59B6" stroke-width="2"/>
  <line x1="620" y1="250" x2="620" y2="225" stroke="#9B59B6" stroke-width="2"/>
  <line x1="620" y1="225" x2="650" y2="225" stroke="#9B59B6" stroke-width="2"/>
  <line x1="650" y1="225" x2="650" y2="185" stroke="#9B59B6" stroke-width="2"/>
  <line x1="650" y1="185" x2="680" y2="185" stroke="#9B59B6" stroke-width="2"/>
  <line x1="680" y1="185" x2="680" y2="135" stroke="#9B59B6" stroke-width="2"/>
  <line x1="680" y1="135" x2="720" y2="135" stroke="#9B59B6" stroke-width="2"/>

  <text x="600" y="242" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#9B59B6">聊天</text>
  <text x="625" y="218" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#9B59B6">Hooks</text>
  <text x="652" y="178" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#9B59B6">Worktree</text>
  <text x="688" y="128" font-family="PingFang SC, Inter, sans-serif" font-size="9" fill="#9B59B6">/batch</text>

  <text x="650" y="278" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F">每一层的认知门槛</text>
  <text x="650" y="298" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#37352F">都是指数级上升</text>
  <text x="650" y="318" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" font-weight="bold" fill="#9B59B6">80% 用户用不到 20%</text>

  <!-- Bottom -->
  <rect x="100" y="355" width="600" height="45" rx="8" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="400" y="383" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="bold" fill="#37352F">深度拆解不回避盲区 -- 知道边界在哪，才能做出更好的判断</text>
</svg>