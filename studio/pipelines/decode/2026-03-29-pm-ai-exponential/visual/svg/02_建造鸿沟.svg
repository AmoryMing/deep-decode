<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="22" font-weight="bold" fill="#37352F">「建造鸿沟」-- 从实现成本到方向选择</text>

  <!-- LEFT: Before -->
  <rect x="30" y="65" width="340" height="320" rx="10" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="200" y="95" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="16" font-weight="bold" fill="#787774">过去</text>

  <!-- Idea bubble -->
  <ellipse cx="200" cy="140" rx="60" ry="25" fill="none" stroke="#37352F" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 3"/>
  <text x="200" y="145" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#37352F">想法</text>

  <!-- River (implementation cost) -->
  <path d="M 60 200 Q 120 185 200 200 Q 280 215 340 200" fill="none" stroke="#2383E2" stroke-width="3" stroke-linecap="round"/>
  <path d="M 60 220 Q 120 205 200 220 Q 280 235 340 220" fill="none" stroke="#2383E2" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <text x="200" y="215" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#2383E2">实现成本的河</text>
  <text x="200" y="252" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">工程师 + 设计师 + 测试 + 排期 + 联调</text>

  <!-- Product (single) -->
  <rect x="160" y="280" width="80" height="50" rx="6" fill="#2383E2" opacity="0.15" stroke="#2383E2" stroke-width="1.5"/>
  <text x="200" y="310" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#2383E2">产品</text>

  <text x="200" y="360" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" font-weight="bold" fill="#37352F">PM 的核心价值:</text>
  <text x="200" y="378" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#787774">决定哪些想法值得过河</text>

  <!-- Arrow -->
  <path d="M 390 225 L 430 225" stroke="#37352F" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#37352F"/>
    </marker>
  </defs>

  <!-- RIGHT: Now -->
  <rect x="430" y="65" width="340" height="320" rx="10" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="600" y="95" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="16" font-weight="bold" fill="#37352F">现在</text>

  <!-- Idea bubble -->
  <ellipse cx="600" cy="140" rx="60" ry="25" fill="none" stroke="#37352F" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 3"/>
  <text x="600" y="145" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#37352F">想法</text>

  <!-- Dried river (just a line) -->
  <line x1="460" y1="200" x2="740" y2="200" stroke="#E3E2E0" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="600" y="195" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#787774">一个下午 = 一个原型</text>

  <!-- Multiple products (too many choices) -->
  <rect x="465" y="230" width="55" height="40" rx="5" fill="#4DB6AC" opacity="0.2" stroke="#4DB6AC" stroke-width="1"/>
  <rect x="530" y="230" width="55" height="40" rx="5" fill="#4DB6AC" opacity="0.2" stroke="#4DB6AC" stroke-width="1"/>
  <rect x="595" y="230" width="55" height="40" rx="5" fill="#EB5757" opacity="0.2" stroke="#EB5757" stroke-width="1.5"/>
  <rect x="660" y="230" width="55" height="40" rx="5" fill="#4DB6AC" opacity="0.2" stroke="#4DB6AC" stroke-width="1"/>
  <rect x="465" y="280" width="55" height="40" rx="5" fill="#4DB6AC" opacity="0.2" stroke="#4DB6AC" stroke-width="1"/>
  <rect x="530" y="280" width="55" height="40" rx="5" fill="#EB5757" opacity="0.2" stroke="#EB5757" stroke-width="1.5"/>
  <rect x="595" y="280" width="55" height="40" rx="5" fill="#4DB6AC" opacity="0.2" stroke="#4DB6AC" stroke-width="1"/>
  <rect x="660" y="280" width="55" height="40" rx="5" fill="#4DB6AC" opacity="0.2" stroke="#4DB6AC" stroke-width="1"/>
  <text x="622" y="255" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#EB5757" font-weight="bold">对的</text>
  <text x="557" y="305" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="11" fill="#EB5757" font-weight="bold">对的</text>

  <text x="600" y="348" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" font-weight="bold" fill="#37352F">PM 的核心价值:</text>
  <text x="600" y="366" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#EB5757">100 个方向里挑对的 2-3 个</text>

  <!-- Bottom insight -->
  <rect x="150" y="405" width="500" height="50" rx="8" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="400" y="435" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="15" font-weight="bold" fill="#37352F">河没了，但目的地变得更多了。方向选择 > 执行速度</text>
</svg>