<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="22" font-weight="bold" fill="#37352F">模型升级即产品升级 -- 循环清理机制</text>

  <!-- Cycle diagram -->
  <!-- Center -->
  <circle cx="400" cy="210" r="60" fill="#F7F7F5" stroke="#2383E2" stroke-width="2"/>
  <text x="400" y="200" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="bold" fill="#2383E2">新模型</text>
  <text x="400" y="220" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="bold" fill="#2383E2">发布</text>

  <!-- Top: Re-evaluate -->
  <rect x="300" y="70" width="200" height="50" rx="8" fill="#4DB6AC" opacity="0.1" stroke="#4DB6AC" stroke-width="1.5"/>
  <text x="400" y="100" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#4DB6AC">重翻「做不到」清单</text>
  <line x1="400" y1="120" x2="400" y2="148" stroke="#4DB6AC" stroke-width="1.5"/>

  <!-- Right: Try again -->
  <rect x="520" y="185" width="200" height="50" rx="8" fill="#2383E2" opacity="0.1" stroke="#2383E2" stroke-width="1.5"/>
  <text x="620" y="215" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#2383E2">新模型再试一次</text>
  <line x1="462" y1="200" x2="518" y2="200" stroke="#2383E2" stroke-width="1.5"/>

  <!-- Bottom: Clean up -->
  <rect x="300" y="300" width="200" height="50" rx="8" fill="#FFB020" opacity="0.1" stroke="#FFB020" stroke-width="1.5"/>
  <text x="400" y="330" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#B8860B">清理旧 workaround</text>
  <line x1="400" y1="272" x2="400" y2="298" stroke="#FFB020" stroke-width="1.5"/>

  <!-- Left: Ship -->
  <rect x="80" y="185" width="200" height="50" rx="8" fill="#9B51E0" opacity="0.1" stroke="#9B51E0" stroke-width="1.5"/>
  <text x="180" y="215" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="14" fill="#9B51E0">精简上线</text>
  <line x1="282" y1="220" x2="338" y2="220" stroke="#9B51E0" stroke-width="1.5"/>

  <!-- Example box -->
  <rect x="80" y="75" width="190" height="40" rx="6" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="175" y="100" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F">System prompt 精简 20%</text>

  <rect x="530" y="100" width="190" height="40" rx="6" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="625" y="125" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#37352F">Chrome 集成从观察到内置</text>

  <!-- Bottom insight -->
  <text x="400" y="380" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="14" font-weight="bold" fill="#37352F">今天的 hack = 明天的技术债（但"明天"可能就两三个月后）</text>
</svg>