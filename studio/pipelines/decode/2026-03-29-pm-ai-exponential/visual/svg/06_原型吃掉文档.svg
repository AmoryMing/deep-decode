<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <rect width="800" height="420" fill="#FFFFFF"/>
  <text x="400" y="38" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="22" font-weight="bold" fill="#37352F">原型吃掉文档 -- PM 能力模型变迁</text>

  <!-- Before -->
  <rect x="40" y="65" width="340" height="200" rx="8" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="210" y="92" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="16" font-weight="bold" fill="#787774">以前的 PM</text>
  <text x="210" y="130" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="15" fill="#37352F">核心产出: 文档</text>
  <text x="210" y="155" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#787774">PRD / 需求说明 / 流程图</text>
  <text x="210" y="195" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="15" fill="#37352F">核心能力: 写得清楚</text>
  <text x="210" y="220" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#787774">把模糊需求翻译成工程师能执行的文档</text>
  <text x="210" y="250" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#EB5757">这个能力的价值在快速下降</text>

  <!-- Arrow -->
  <defs><marker id="ar2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#37352F"/></marker></defs>
  <line x1="390" y1="165" x2="420" y2="165" stroke="#37352F" stroke-width="2" marker-end="url(#ar2)"/>

  <!-- After -->
  <rect x="420" y="65" width="340" height="200" rx="8" fill="#F7F7F5" stroke="#2383E2" stroke-width="1.5"/>
  <text x="590" y="92" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="16" font-weight="bold" fill="#2383E2">现在的 PM</text>
  <text x="590" y="130" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="15" fill="#37352F">核心产出: 原型 + Eval</text>
  <text x="590" y="155" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#787774">可运行的东西 + 可衡量的标准</text>
  <text x="590" y="195" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="15" fill="#37352F">核心能力: 看得准</text>
  <text x="590" y="220" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#787774">在 100 个原型里挑出最对的 2-3 个</text>
  <text x="590" y="250" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#4DB6AC" font-weight="bold">Tastemaker = 品味把关者</text>

  <!-- Supporting quotes -->
  <rect x="40" y="290" width="720" height="100" rx="8" fill="#F7F7F5" stroke="#E3E2E0" stroke-width="1"/>
  <text x="400" y="315" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#787774" font-style="italic">"Prompt sets are the new PRDs... demos before memos."</text>
  <text x="400" y="335" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">-- Aparna Chennapragada, Microsoft CPO</text>
  <text x="400" y="365" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="13" fill="#787774" font-style="italic">"We're all product builders, just with different specializations."</text>
  <text x="400" y="385" text-anchor="middle" font-family="PingFang SC, Inter, sans-serif" font-size="12" fill="#787774">-- Dylan Field, Figma CEO</text>
</svg>