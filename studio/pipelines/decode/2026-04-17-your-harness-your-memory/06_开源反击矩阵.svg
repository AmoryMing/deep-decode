<svg width="800" height="540" viewBox="0 0 800 540" xmlns="http://www.w3.org/2000/svg" font-family="PingFang SC, Inter, sans-serif">
  <rect width="800" height="540" fill="#FFFFFF"/>

  <text x="400" y="45" text-anchor="middle" font-size="22" font-weight="bold" fill="#37352F">开源派的反击矩阵</text>
  <text x="400" y="72" text-anchor="middle" font-size="14" fill="#787774">议题 + 产品 + 协同叙事：一次典型的 B2B 舆论战</text>

  <g>
    <rect x="50" y="110" width="340" height="180" rx="10" fill="#F0FAF8" stroke="#4DB6AC" stroke-width="1.5"/>
    <text x="75" y="140" font-size="16" fill="#4DB6AC" font-weight="bold">Letta 阵营</text>
    <text x="75" y="165" font-size="12" fill="#787774">Sarah Wooders + MemGPT</text>
    <line x1="75" y1="175" x2="370" y2="175" stroke="#E3E2E0"/>
    <text x="75" y="200" font-size="13" fill="#37352F" font-weight="600">同期动作：</text>
    <text x="75" y="222" font-size="12" fill="#37352F">• Context Constitution (4/2)</text>
    <text x="75" y="243" font-size="12" fill="#37352F">• Sarah 推文 (4/3)</text>
    <text x="75" y="264" font-size="12" fill="#37352F">• Letta Code memory-first CLI</text>
    <rect x="75" y="274" width="290" height="12" rx="4" fill="#FFFFFF"/>
  </g>

  <g>
    <rect x="410" y="110" width="340" height="180" rx="10" fill="#EEF6FF" stroke="#2383E2" stroke-width="1.5"/>
    <text x="435" y="140" font-size="16" fill="#2383E2" font-weight="bold">LangChain 阵营</text>
    <text x="435" y="165" font-size="12" fill="#787774">Harrison Chase + Deep Agents</text>
    <line x1="435" y1="175" x2="730" y2="175" stroke="#E3E2E0"/>
    <text x="435" y="200" font-size="13" fill="#37352F" font-weight="600">同期动作：</text>
    <text x="435" y="222" font-size="12" fill="#37352F">• Deep Agents Deploy (≈4/10)</text>
    <text x="435" y="243" font-size="12" fill="#37352F">• Harrison 长推 (4/11)</text>
    <text x="435" y="264" font-size="12" fill="#37352F">• LangSmith 自托管部署</text>
  </g>

  <path d="M 390 200 Q 400 210 410 200" stroke="#787774" stroke-width="2" fill="none"/>
  <text x="400" y="220" text-anchor="middle" font-size="18" fill="#9B51E0">↔</text>
  <text x="400" y="246" text-anchor="middle" font-size="11" fill="#787774">致谢</text>
  <text x="400" y="260" text-anchor="middle" font-size="11" fill="#787774">引用</text>

  <g>
    <rect x="50" y="320" width="700" height="140" rx="10" fill="#FFF5F5" stroke="#EB5757" stroke-width="2"/>
    <text x="400" y="352" text-anchor="middle" font-size="16" font-weight="bold" fill="#EB5757">共同靶子：Anthropic Claude Managed Agents</text>
    <line x1="200" y1="365" x2="600" y2="365" stroke="#E3E2E0"/>
    <text x="75" y="390" font-size="12" fill="#37352F" font-weight="600">开放标准</text>
    <text x="75" y="412" font-size="12" fill="#37352F">agents.md / skills</text>
    <text x="75" y="432" font-size="12" fill="#37352F">MCP / A2A / Agent Protocol</text>

