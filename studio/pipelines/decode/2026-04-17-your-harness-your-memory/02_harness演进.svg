<svg width="800" height="520" viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" font-family="PingFang SC, Inter, sans-serif">
  <rect width="800" height="520" fill="#FFFFFF"/>

  <text x="400" y="45" text-anchor="middle" font-size="22" font-weight="bold" fill="#37352F">模型越强 Harness 反而越重要</text>
  <text x="400" y="72" text-anchor="middle" font-size="14" fill="#787774">反直觉推论：2023 的 scaffolding 被吸收，但 2026 的 harness 更重</text>

  <g>
    <rect x="50" y="110" width="220" height="330" rx="12" fill="#F7F7F5" stroke="#E3E2E0"/>
    <text x="160" y="145" text-anchor="middle" font-size="16" font-weight="bold" fill="#37352F">2023</text>
    <text x="160" y="170" text-anchor="middle" font-size="14" fill="#2383E2" font-weight="600">简单 RAG Chain</text>
    <line x1="80" y1="185" x2="240" y2="185" stroke="#E3E2E0"/>
    <text x="70" y="215" font-size="12" fill="#787774">代表：LangChain v0</text>
    <text x="70" y="240" font-size="12" fill="#787774">复杂度：低</text>
    <text x="70" y="265" font-size="12" fill="#787774">核心：向量检索+拼接</text>
    <rect x="70" y="290" width="180" height="35" rx="4" fill="#FFFFFF" stroke="#E3E2E0"/>
    <text x="160" y="313" text-anchor="middle" font-size="12" fill="#37352F">模型吸收了 ✓</text>
    <text x="160" y="395" text-anchor="middle" font-size="11" fill="#787774">简单场景</text>
    <text x="160" y="415" text-anchor="middle" font-size="11" fill="#787774">直接调用即可</text>
  </g>

  <g>
    <rect x="290" y="110" width="220" height="330" rx="12" fill="#F7F7F5" stroke="#E3E2E0"/>
    <text x="400" y="145" text-anchor="middle" font-size="16" font-weight="bold" fill="#37352F">2024-2025</text>
    <text x="400" y="170" text-anchor="middle" font-size="14" fill="#FFB020" font-weight="600">图状工作流</text>
    <line x1="320" y1="185" x2="480" y2="185" stroke="#E3E2E0"/>
    <text x="310" y="215" font-size="12" fill="#787774">代表：LangGraph</text>
    <text x="310" y="240" font-size="12" fill="#787774">复杂度：中</text>
    <text x="310" y="265" font-size="12" fill="#787774">核心：多步骤编排</text>
    <rect x="310" y="290" width="180" height="35" rx="4" fill="#FFFFFF" stroke="#E3E2E0"/>
    <text x="400" y="313" text-anchor="middle" font-size="12" fill="#37352F">部分被吸收 ~</text>
    <text x="400" y="395" text-anchor="middle" font-size="11" fill="#787774">工具路由+状态机</text>
    <text x="400" y="415" text-anchor="middle" font-size="11" fill="#787774">仍需要 scaffolding</text>
  </g>

  <g>
    <rect x="530" y="110" width="220" height="330" rx="12" fill="#FFF5F5" stroke="#EB5757" stroke-width="2"/>
    <text x="640" y="145" text-anchor="middle" font-size="16" font-weight="bold" fill="#37352F">2026</text>
    <text x="640" y="170" text-anchor="middle" font-size="14" fill="#EB5757" font-weight="600">Agent Harness</text>
    <line x1="560" y1="185" x2="720" y2="185" stroke="#E3E2E0"/>
    <text x="550" y="215" font-size="12" fill="#787774">代表：Claude Code</text>
    <text x="550" y="240" font-size="12" fill="#787774">复杂度：极高</text>
    <text x="550" y="265" font-size="13" fill="#EB5757" font-weight="bold">51.2 万行代码</text>
    <rect x="550" y="290" width="180" height="35" rx="4" fill="#FFFFFF" stroke="#EB5757"/>
    <text x="640" y="313" text-anchor="middle" font-size="12" fill="#37352F" font-weight="bold">不可能被吸收 ✗</text>
    <text x="640" y="395" text-anchor="middle" font-size="11" fill="#787774">工具+Memory+</text>
    <text x="640" y="415" text-anchor="middle" font-size="11" fill="#787774">多 Agent+安全</text>
  </g>

  <text x="400" y="475" text-anchor="middle" font-size="14" fill="#37352F" font-weight="600">连做世界最好模型的 Anthropic，都在疯狂投资 harness</text>
  <text x="400" y="500" text-anchor="middle" font-size="12" fill="#787774">"模型内置 web search" 的背后，也是 harness 在做 tool calling</text>
</svg>
