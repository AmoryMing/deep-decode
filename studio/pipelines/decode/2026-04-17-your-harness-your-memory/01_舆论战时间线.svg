<svg width="800" height="560" viewBox="0 0 800 560" xmlns="http://www.w3.org/2000/svg" font-family="PingFang SC, Inter, sans-serif">
  <rect width="800" height="560" fill="#FFFFFF"/>

  <text x="400" y="45" text-anchor="middle" font-size="22" font-weight="bold" fill="#37352F">12 天 6 个动作：开源派 vs Anthropic 的协同作战</text>
  <text x="400" y="72" text-anchor="middle" font-size="14" fill="#787774">LangChain + Letta 两家公司，一个立场</text>

  <line x1="100" y1="280" x2="700" y2="280" stroke="#37352F" stroke-width="2"/>

  <g>
    <circle cx="130" cy="280" r="10" fill="#EB5757"/>
    <text x="130" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#37352F">3/31</text>
    <rect x="75" y="150" width="110" height="95" rx="8" fill="#FFF5F5" stroke="#EB5757"/>
    <text x="130" y="175" text-anchor="middle" font-size="12" fill="#EB5757" font-weight="600">引爆点</text>
    <text x="130" y="198" text-anchor="middle" font-size="11" fill="#37352F">Claude Code</text>
    <text x="130" y="214" text-anchor="middle" font-size="11" fill="#37352F">源码泄漏</text>
    <text x="130" y="232" text-anchor="middle" font-size="11" fill="#787774" font-weight="bold">51.2 万行</text>
  </g>

  <g>
    <circle cx="225" cy="280" r="10" fill="#4DB6AC"/>
    <text x="225" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#37352F">4/2</text>
    <rect x="170" y="345" width="110" height="95" rx="8" fill="#F0FAF8" stroke="#4DB6AC"/>
    <text x="225" y="370" text-anchor="middle" font-size="12" fill="#4DB6AC" font-weight="600">Letta 动作</text>
    <text x="225" y="393" text-anchor="middle" font-size="11" fill="#37352F">Context</text>
    <text x="225" y="409" text-anchor="middle" font-size="11" fill="#37352F">Constitution</text>
    <text x="225" y="427" text-anchor="middle" font-size="11" fill="#787774">上下文宪章</text>
  </g>

  <g>
    <circle cx="320" cy="280" r="10" fill="#4DB6AC"/>
    <text x="320" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#37352F">4/3</text>
    <rect x="265" y="150" width="110" height="95" rx="8" fill="#F0FAF8" stroke="#4DB6AC"/>
    <text x="320" y="175" text-anchor="middle" font-size="12" fill="#4DB6AC" font-weight="600">Sarah 推文</text>
    <text x="320" y="198" text-anchor="middle" font-size="11" fill="#37352F">Memory 不是</text>
    <text x="320" y="214" text-anchor="middle" font-size="11" fill="#37352F">Plugin</text>
    <text x="320" y="232" text-anchor="middle" font-size="11" fill="#787774">131K 阅读</text>
  </g>

  <g>
    <circle cx="430" cy="280" r="12" fill="#FFB020"/>
    <text x="430" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#37352F">4/8</text>
    <rect x="370" y="345" width="130" height="95" rx="8" fill="#FFF8E8" stroke="#FFB020"/>
    <text x="435" y="370" text-anchor="middle" font-size="12" fill="#FFB020" font-weight="600">Anthropic 出招</text>
    <text x="435" y="393" text-anchor="middle" font-size="11" fill="#37352F">Managed Agents</text>
    <text x="435" y="409" text-anchor="middle" font-size="11" fill="#37352F">公测发布</text>
    <text x="435" y="427" text-anchor="middle" font-size="11" fill="#787774">$0.08/session-h</text>
  </g>

  <g>
    <circle cx="540" cy="280" r="10" fill="#2383E2"/>
    <text x="540" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#37352F">4/10</text>
    <rect x="485" y="150" width="110" height="95" rx="8" fill="#EEF6FF" stroke="#2383E2"/>
    <text x="540" y="175" text-anchor="middle" font-size="12" fill="#2383E2" font-weight="600">LangChain 反击</text>
    <text x="540" y="198" text-anchor="middle" font-size="11" fill="#37352F">Deep Agents</text>
    <text x="540" y="214" text-anchor="middle" font-size="11" fill="#37352F">Deploy 发布</text>
    <text x="540" y="232" text-anchor="middle" font-size="10" fill="#787774">open alternative</text>
  </g>

  <g>
    <circle cx="640" cy="280" r="12" fill="#2383E2"/>
    <text x="640" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#37352F">4/11</text>
    <rect x="575" y="345" width="130" height="95" rx="8" fill="#EEF6FF" stroke="#2383E2"/>
    <text x="640" y="370" text-anchor="middle" font-size="12" fill="#2383E2" font-weight="600">Harrison 开火</text>
    <text x="640" y="393" text-anchor="middle" font-size="11" fill="#37352F">Your Harness,</text>
    <text x="640" y="409" text-anchor="middle" font-size="11" fill="#37352F">Your Memory</text>
    <text x="640" y="427" text-anchor="middle" font-size="11" fill="#787774">1.8M 阅读</text>
  </g>

  <text x="400" y="500" text-anchor="middle" font-size="14" fill="#37352F" font-weight="600">时间线的同步性 = 有协同的商业战，不是偶发的技术思辨</text>
  <text x="400" y="528" text-anchor="middle" font-size="12" fill="#787774">议题先行，产品跟上。Harrison 长推 = Deep Agents Deploy 的炮兵观测员</text>
</svg>
