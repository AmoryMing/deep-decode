<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="PingFang SC, Inter, sans-serif">
  <rect width="800" height="600" fill="#FFFFFF"/>

  <text x="400" y="45" text-anchor="middle" font-size="22" font-weight="bold" fill="#37352F">7 个只有 Harness 能回答的决策</text>
  <text x="400" y="72" text-anchor="middle" font-size="14" fill="#787774">"把 memory 插进 harness，就像把'开车'插进汽车" —— Sarah Wooders</text>

  <circle cx="400" cy="320" r="75" fill="#2383E2"/>
  <text x="400" y="310" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">Harness</text>
  <text x="400" y="335" text-anchor="middle" font-size="12" fill="#FFFFFF">= Memory</text>

  <g>
    <rect x="130" y="120" width="180" height="60" rx="8" fill="#F7F7F5" stroke="#E3E2E0"/>
    <text x="220" y="143" text-anchor="middle" font-size="12" fill="#2383E2" font-weight="600">1</text>
    <text x="220" y="163" text-anchor="middle" font-size="12" fill="#37352F">AGENTS.md 怎么加载？</text>
    <line x1="310" y1="180" x2="345" y2="280" stroke="#C6C6C4" stroke-width="1"/>
  </g>

  <g>
    <rect x="490" y="120" width="180" height="60" rx="8" fill="#F7F7F5" stroke="#E3E2E0"/>
    <text x="580" y="143" text-anchor="middle" font-size="12" fill="#2383E2" font-weight="600">2</text>
    <text x="580" y="163" text-anchor="middle" font-size="12" fill="#37352F">Skill metadata 放哪里？</text>
    <line x1="490" y1="180" x2="455" y2="280" stroke="#C6C6C4" stroke-width="1"/>
  </g>

  <g>
    <rect x="50" y="220" width="180" height="60" rx="8" fill="#F7F7F5" stroke="#E3E2E0"/>
    <text x="140" y="243" text-anchor="middle" font-size="12" fill="#2383E2" font-weight="600">3</text>
    <text x="140" y="263" text-anchor="middle" font-size="12" fill="#37352F">Agent 能改自己 prompt？</text>
    <line x1="230" y1="260" x2="330" y2="310" stroke="#C6C6C4" stroke-width="1"/>
  </g>

  <g>
    <rect x="570" y="220" width="180" height="60" rx="8" fill="#FFF5F5" stroke="#EB5757" stroke-width="2"/>
    <text x="660" y="243" text-anchor="middle" font-size="12" fill="#EB5757" font-weight="600">4 ⚡</text>
    <text x="660" y="263" text-anchor="middle" font-size="12" fill="#37352F" font-weight="bold">Compaction 留啥丢啥？</text>
    <line x1="570" y1="260" x2="470" y2="310" stroke="#C6C6C4" stroke-width="1"/>
  </g>

  <g>
    <rect x="50" y="360" width="180" height="60" rx="8" fill="#F7F7F5" stroke="#E3E2E0"/>
    <text x="140" y="383" text-anchor="middle" font-size="12" fill="#2383E2" font-weight="600">5</text>
    <text x="140" y="403" text-anchor="middle" font-size="12" fill="#37352F">交互是否被存储查询？</text>
    <line x1="230" y1="380" x2="330" y2="340" stroke="#C6C6C4" stroke-width="1"/>
  </g>

  <g>
    <rect x="570" y="360" width="180" height="60" rx="8" fill="#F7F7F5" stroke="#E3E2E0"/>
    <text x="660" y="383" text-anchor="middle" font-size="12" fill="#2383E2" font-weight="600">6</text>
    <text x="660" y="403" text-anchor="middle" font-size="12" fill="#37352F">Memory metadata 怎么展示？</text>
    <line x1="570" y1="380" x2="470" y2="340" stroke="#C6C6C4" stroke-width="1"/>
  </g>

  <g>
    <rect x="310" y="460" width="180" height="60" rx="8" fill="#F7F7F5" stroke="#E3E2E0"/>
    <text x="400" y="483" text-anchor="middle" font-size="12" fill="#2383E2" font-weight="600">7</text>
    <text x="400" y="503" text-anchor="middle" font-size="12" fill="#37352F">文件系统暴露多少？</text>
    <line x1="400" y1="460" x2="400" y2="395" stroke="#C6C6C4" stroke-width="1"/>
  </g>

  <text x="400" y="560" text-anchor="middle" font-size="13" fill="#37352F" font-weight="600">每个决策都耦合。外部 plugin 能碰的，只是 7 个决策之外的残渣——而那部分用 grep 就够</text>
  <text x="400" y="585" text-anchor="middle" font-size="12" fill="#787774">"Memory 赛道"其实不存在，存在的是"Harness 赛道"</text>
</svg>
