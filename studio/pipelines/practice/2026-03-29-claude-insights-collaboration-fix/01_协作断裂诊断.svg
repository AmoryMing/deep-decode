<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <style>
      text { font-family: 'PingFang SC', 'Inter', sans-serif; }
    </style>
  </defs>

  <rect width="800" height="450" fill="#FFFFFF"/>

  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#37352F">协作断裂诊断：你在说意图，AI 在听指令</text>

  <!-- Left: Human side -->
  <rect x="40" y="80" width="320" height="140" rx="12" fill="#F0F9FF" stroke="#7DD3FC" stroke-width="1.5"/>
  <text x="200" y="108" text-anchor="middle" font-size="14" font-weight="600" fill="#0369A1">你说的（意图层）</text>
  <text x="60" y="138" font-size="13" fill="#334155">"帮我分析一下用户问答质量"</text>
  <text x="60" y="158" font-size="11" fill="#64748B">意思：找到产品核心瓶颈在哪</text>
  <line x1="60" y1="172" x2="340" y2="172" stroke="#E2E8F0" stroke-width="1"/>
  <text x="60" y="192" font-size="13" fill="#334155">"把配置流程自动化"</text>
  <text x="60" y="212" font-size="11" fill="#64748B">意思：先跑通一张表再说</text>

  <!-- Right: AI side -->
  <rect x="440" y="80" width="320" height="140" rx="12" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="600" y="108" text-anchor="middle" font-size="14" font-weight="600" fill="#991B1B">AI 听到的（执行层）</text>
  <text x="460" y="138" font-size="13" fill="#334155">全量标注 + 多维度交叉分析</text>
  <text x="460" y="158" font-size="11" fill="#64748B">先建分类体系再跑标注...</text>
  <line x1="460" y1="172" x2="740" y2="172" stroke="#FECACA" stroke-width="1"/>
  <text x="460" y="192" font-size="13" fill="#334155">10 个 MCP 工具全链路设计</text>
  <text x="460" y="212" font-size="11" fill="#64748B">从元数据查询到批量上线...</text>

  <!-- Arrow between -->
  <line x1="370" y1="150" x2="430" y2="150" stroke="#EB5757" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="400" y="145" text-anchor="middle" font-size="22" fill="#EB5757">✗</text>

  <!-- Data bar -->
  <rect x="40" y="260" width="720" height="80" rx="12" fill="#F7F7F5" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="288" text-anchor="middle" font-size="14" font-weight="600" fill="#37352F">Insights 报告数据（111 sessions / 1 个月）</text>

  <rect x="70" y="300" width="180" height="30" rx="4" fill="#EB5757" opacity="0.15"/>
  <text x="160" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#991B1B">79 次方向跑偏 (71%)</text>

  <rect x="280" y="300" width="190" height="30" rx="4" fill="#FFB020" opacity="0.15"/>
  <text x="375" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">55 次意图理解错 (50%)</text>

  <rect x="500" y="300" width="190" height="30" rx="4" fill="#4DB6AC" opacity="0.15"/>
  <text x="595" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#0F766E">499h / 2030 条消息</text>

  <!-- Bottom insight -->
  <rect x="40" y="370" width="720" height="60" rx="12" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="400" y="395" text-anchor="middle" font-size="14" font-weight="600" fill="#166534">核心发现：问题不在 AI 的能力，在人机接口的设计</text>
  <text x="400" y="415" text-anchor="middle" font-size="12" fill="#15803D">规则对齐 > 提示词优化</text>
</svg>