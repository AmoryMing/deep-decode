<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560">
  <rect width="800" height="560" fill="#FFF5E1"/>
  <rect x="40" y="20" width="4" height="30" rx="2" fill="#C47B2B"/>
  <text x="55" y="43" font-family="PingFang SC, Georgia, serif" font-size="20" fill="#2B1D0E" font-weight="bold">Harness 的每个组件都是一个假设</text>
  <text x="55" y="65" font-family="PingFang SC, Georgia, serif" font-size="13" fill="#8B7355">原文核心原则："每个组件都在假设模型还做不到某件事"——这个假设需要被持续验证</text>

  <!-- Core quote -->
  <g transform="translate(30, 88)">
    <rect width="740" height="62" rx="10" fill="#C47B2B" opacity="0.08" stroke="#C47B2B" stroke-width="1.5"/>
    <text x="30" y="28" font-family="PingFang SC, Georgia, serif" font-size="13" fill="#C47B2B" font-weight="bold" font-style="italic">"Every component in a harness encodes an assumption about what the model can't do on its own,</text>
    <text x="30" y="48" font-family="PingFang SC, Georgia, serif" font-size="13" fill="#C47B2B" font-weight="bold" font-style="italic">and those assumptions are worth stress testing — because they can quickly go stale as models improve."</text>
  </g>

  <!-- Component assumption table -->
  <text x="55" y="186" font-family="PingFang SC, Georgia, serif" font-size="14" fill="#C47B2B" font-weight="bold">Opus 4.5 → Opus 4.6：哪些假设过时了</text>

  <g transform="translate(30, 200)">
    <!-- Header -->
    <rect width="740" height="30" rx="8" fill="#C47B2B" opacity="0.15"/>
    <text x="15" y="20" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#C47B2B" font-weight="bold">Harness 组件</text>
    <text x="235" y="20" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#C47B2B" font-weight="bold">编码的假设</text>
    <text x="490" y="20" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#C47B2B" font-weight="bold">Opus 4.6 之后</text>

    <!-- Row 1: Sprint decomposer -->
    <rect x="0" y="36" width="740" height="42" rx="4" fill="#FFF0F0"/>
    <text x="15" y="52" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#CC4444" font-weight="bold">Sprint 分解器</text>
    <text x="15" y="68" font-family="PingFang SC, Georgia, serif" font-size="10" fill="#8B7355">（Opus 4.5 时期需要）</text>
    <text x="235" y="58" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#5D4E37">模型无法在单次会话中</text>
    <text x="235" y="72" font-family="PingFang SC, Georgia, serif" font-size="11" fill="#5D4E37">保持长期任务连贯性</text>
    <rect x="490" y="40" width="235" height="30" rx="4" fill="#CC4444" opacity="0.1"/>
    <text x="607" y="59" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#CC4444" text-anchor="middle" font-weight="bold">已移除 — 假设过时</text>

    <!-- Row 2: Per-sprint evaluator -->
    <rect x="0" y="84" width="740" height="42" rx="4" fill="#FFF0F0"/>
    <text x="15" y="100" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#CC4444" font-weight="bold">每 Sprint 评估器</text>
    <text x="15" y="116" font-family="PingFang SC, Georgia, serif" font-size="10" fill="#8B7355">（Opus 4.5 时期需要）</text>
    <text x="235" y="106" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#5D4E37">需要频繁纠偏才能保证</text>
    <text x="235" y="120" font-family="PingFang SC, Georgia, serif" font-size="11" fill="#5D4E37">任务不偏离方向</text>
    <rect x="490" y="88" width="235" height="30" rx="4" fill="#CC4444" opacity="0.1"/>
    <text x="607" y="107" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#CC4444" text-anchor="middle" font-weight="bold">已移除 — 假设过时</text>

    <!-- Row 3: Context reset -->
    <rect x="0" y="132" width="740" height="42" rx="4" fill="#F0FFF0"/>
    <text x="15" y="148" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#448844" font-weight="bold">上下文重置机制</text>
    <text x="15" y="164" font-family="PingFang SC, Georgia, serif" font-size="10" fill="#8B7355">（仍保留）</text>
    <text x="235" y="154" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#5D4E37">超长任务仍需隔离</text>
    <text x="235" y="168" font-family="PingFang SC, Georgia, serif" font-size="11" fill="#5D4E37">不同阶段的上下文</text>
    <rect x="490" y="136" width="235" height="30" rx="4" fill="#448844" opacity="0.1"/>
    <text x="607" y="155" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#448844" text-anchor="middle" font-weight="bold">保留 — 假设仍然成立</text>

    <!-- Row 4: Generator/Evaluator separation -->
    <rect x="0" y="180" width="740" height="42" rx="4" fill="#F0FFF0"/>
    <text x="15" y="196" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#448844" font-weight="bold">生成 / 评估分离</text>
    <text x="15" y="212" font-family="PingFang SC, Georgia, serif" font-size="10" fill="#8B7355">（仍保留）</text>
    <text x="235" y="202" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#5D4E37">自评偏差是结构性问题</text>
    <text x="235" y="216" font-family="PingFang SC, Georgia, serif" font-size="11" fill="#5D4E37">无法靠模型能力解决</text>
    <rect x="490" y="184" width="235" height="30" rx="4" fill="#448844" opacity="0.1"/>
    <text x="607" y="203" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#448844" text-anchor="middle" font-weight="bold">保留 — 假设仍然成立</text>

    <!-- Row 5: Sprint contract -->
    <rect x="0" y="228" width="740" height="42" rx="4" fill="#F0FFF0"/>
    <text x="15" y="244" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#448844" font-weight="bold">Sprint 合约谈判</text>
    <text x="15" y="260" font-family="PingFang SC, Georgia, serif" font-size="10" fill="#8B7355">（仍保留）</text>
    <text x="235" y="250" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#5D4E37">模型无法从模糊需求</text>
    <text x="235" y="264" font-family="PingFang SC, Georgia, serif" font-size="11" fill="#5D4E37">自动生成精确验收标准</text>
    <rect x="490" y="232" width="235" height="30" rx="4" fill="#448844" opacity="0.1"/>
    <text x="607" y="251" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#448844" text-anchor="middle" font-weight="bold">保留 — 假设仍然成立</text>
  </g>

  <!-- Practical advice -->
  <g transform="translate(30, 468)">
    <rect width="740" height="72" rx="10" fill="#FFF9EE" stroke="#C47B2B" stroke-width="1.5"/>
    <text x="20" y="24" font-family="PingFang SC, Georgia, serif" font-size="13" fill="#C47B2B" font-weight="bold">实际操作建议</text>
    <line x1="20" y1="34" x2="720" y2="34" stroke="#E8D5B5" stroke-width="0.5"/>
    <circle cx="30" cy="52" r="3" fill="#C47B2B"/>
    <text x="42" y="56" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#5D4E37">每次模型升级后，逐个审查 Harness 组件：问"如果去掉这个，新模型还会出之前的问题吗？"</text>
    <circle cx="30" cy="68" r="3" fill="#C47B2B"/>
    <text x="42" y="72" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#5D4E37">组件存在有成本：增加延迟、提升 token 消耗、引入协调复杂度——不能因为"以防万一"就保留</text>
  </g>
</svg>
