<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 570">
  <rect width="800" height="570" fill="#FFF5E1"/>
  <rect x="40" y="20" width="4" height="30" rx="2" fill="#C47B2B"/>
  <text x="55" y="43" font-family="PingFang SC, Georgia, serif" font-size="20" fill="#2B1D0E" font-weight="bold">硬数据：两个项目的完整成本拆解</text>
  <text x="55" y="65" font-family="PingFang SC, Georgia, serif" font-size="13" fill="#8B7355">游戏生成器（Opus 4.5）+ DAW 数字音频工作站（Opus 4.6）——真实账单，不是估算</text>

  <!-- Game maker comparison -->
  <text x="55" y="100" font-family="PingFang SC, Georgia, serif" font-size="14" fill="#C47B2B" font-weight="bold">项目一：游戏生成器（使用 Opus 4.5）</text>

  <g transform="translate(30, 113)">
    <!-- Solo agent -->
    <rect x="0" y="0" width="218" height="130" rx="10" fill="#FFF0F0" stroke="#CC6666" stroke-width="1.5"/>
    <rect x="0" y="0" width="218" height="30" rx="10" fill="#CC4444" opacity="0.12"/>
    <text x="109" y="20" font-family="PingFang SC, Georgia, serif" font-size="13" fill="#CC4444" text-anchor="middle" font-weight="bold">单兵 Agent</text>
    <text x="109" y="52" font-family="PingFang SC, Georgia, serif" font-size="32" fill="#CC4444" text-anchor="middle" font-weight="bold">$9</text>
    <text x="109" y="70" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#8B7355" text-anchor="middle">20 分钟</text>
    <line x1="20" y1="80" x2="198" y2="80" stroke="#F0C8C8" stroke-width="0.5"/>
    <text x="109" y="98" font-family="PingFang SC, Georgia, serif" font-size="11" fill="#CC4444" text-anchor="middle">核心游戏逻辑不可运行</text>
    <text x="109" y="116" font-family="PingFang SC, Georgia, serif" font-size="11" fill="#CC4444" text-anchor="middle">实体输入接线断路</text>

    <!-- VS -->
    <text x="238" y="75" font-family="PingFang SC, Georgia, serif" font-size="18" fill="#C47B2B" text-anchor="middle" font-weight="bold">VS</text>

    <!-- Three-agent harness -->
    <rect x="258" y="0" width="218" height="130" rx="10" fill="#F0FFF0" stroke="#66AA66" stroke-width="1.5"/>
    <rect x="258" y="0" width="218" height="30" rx="10" fill="#448844" opacity="0.12"/>
    <text x="367" y="20" font-family="PingFang SC, Georgia, serif" font-size="13" fill="#448844" text-anchor="middle" font-weight="bold">三智能体 Harness</text>
    <text x="367" y="52" font-family="PingFang SC, Georgia, serif" font-size="32" fill="#448844" text-anchor="middle" font-weight="bold">$200</text>
    <text x="367" y="70" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#8B7355" text-anchor="middle">6 小时</text>
    <line x1="278" y1="80" x2="456" y2="80" stroke="#C8E6C8" stroke-width="0.5"/>
    <text x="367" y="98" font-family="PingFang SC, Georgia, serif" font-size="11" fill="#448844" text-anchor="middle">物理引擎正常运行</text>
    <text x="367" y="116" font-family="PingFang SC, Georgia, serif" font-size="11" fill="#448844" text-anchor="middle">功能完备可玩，AI 功能集成</text>

    <!-- 20x label -->
    <rect x="496" y="40" width="234" height="50" rx="8" fill="#C47B2B" opacity="0.08" stroke="#C47B2B" stroke-width="1"/>
    <text x="613" y="62" font-family="PingFang SC, Georgia, serif" font-size="14" fill="#C47B2B" text-anchor="middle" font-weight="bold">成本 20× 差距</text>
    <text x="613" y="80" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#8B7355" text-anchor="middle">质量差距更大，不可比</text>
  </g>

  <!-- DAW breakdown -->
  <text x="55" y="273" font-family="PingFang SC, Georgia, serif" font-size="14" fill="#C47B2B" font-weight="bold">项目二：DAW 数字音频工作站（使用 Opus 4.6）</text>

  <g transform="translate(30, 288)">
    <rect width="740" height="145" rx="10" fill="#FFF9EE" stroke="#C47B2B" stroke-width="1.5"/>
    <text x="20" y="24" font-family="PingFang SC, Georgia, serif" font-size="13" fill="#C47B2B" font-weight="bold">完整成本明细</text>
    <line x1="20" y1="34" x2="720" y2="34" stroke="#E8D5B5" stroke-width="0.5"/>

    <!-- Three rows -->
    <rect x="20" y="46" width="215" height="55" rx="8" fill="#F5EDE0"/>
    <text x="127" y="66" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#C47B2B" text-anchor="middle" font-weight="bold">规划器（Planner）</text>
    <text x="127" y="84" font-family="PingFang SC, Georgia, serif" font-size="13" fill="#2B1D0E" text-anchor="middle" font-weight="bold">$0.46</text>
    <text x="127" y="98" font-family="PingFang SC, Georgia, serif" font-size="11" fill="#8B7355" text-anchor="middle">耗时 4.7 分钟</text>

    <rect x="253" y="46" width="215" height="55" rx="8" fill="#F5EDE0"/>
    <text x="360" y="66" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#B8860B" text-anchor="middle" font-weight="bold">构建轮次 1（Build Round 1）</text>
    <text x="360" y="84" font-family="PingFang SC, Georgia, serif" font-size="13" fill="#2B1D0E" text-anchor="middle" font-weight="bold">$71.08</text>
    <text x="360" y="98" font-family="PingFang SC, Georgia, serif" font-size="11" fill="#8B7355" text-anchor="middle">耗时 2 小时 7 分钟</text>

    <rect x="486" y="46" width="234" height="55" rx="8" fill="#F5EDE0"/>
    <text x="603" y="66" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#448844" text-anchor="middle" font-weight="bold">合计</text>
    <text x="603" y="84" font-family="PingFang SC, Georgia, serif" font-size="13" fill="#2B1D0E" text-anchor="middle" font-weight="bold">$124.70</text>
    <text x="603" y="98" font-family="PingFang SC, Georgia, serif" font-size="11" fill="#8B7355" text-anchor="middle">总耗时 3 小时 50 分钟</text>

    <rect x="20" y="112" width="700" height="24" rx="6" fill="#448844" opacity="0.08"/>
    <text x="370" y="128" font-family="PingFang SC, Georgia, serif" font-size="11" fill="#448844" text-anchor="middle">Opus 4.6 支持 2+ 小时连贯构建，Sprint 分解结构因此被移除——更简洁，成本更低</text>
  </g>

  <!-- Cost perspective -->
  <g transform="translate(30, 453)">
    <rect width="740" height="95" rx="10" fill="#FFF9EE" stroke="#B8860B" stroke-width="1.5"/>
    <text x="20" y="24" font-family="PingFang SC, Georgia, serif" font-size="13" fill="#B8860B" font-weight="bold">怎么看这个成本？</text>
    <line x1="20" y1="34" x2="720" y2="34" stroke="#E8D5B5" stroke-width="0.5"/>

    <circle cx="30" cy="54" r="3" fill="#B8860B"/>
    <text x="42" y="58" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#5D4E37">$200 = 一个初级工程师约 1 小时工资——但 6 小时内产出了功能完整的全栈应用，不可能用人力匹配</text>

    <circle cx="30" cy="76" r="3" fill="#B8860B"/>
    <text x="42" y="80" font-family="PingFang SC, Georgia, serif" font-size="12" fill="#5D4E37">关键问题不是贵不贵，而是：任务复杂度是否匹配使用多智能体架构的门槛？简单任务单 Agent 更划算</text>
  </g>
</svg>
